<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ReDevPlugin Opaque Surface Demo</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="host-shell">
      <aside class="host-console" aria-label="Trusted host controls">
        <header class="console-header">
          <div>
            <p class="eyebrow">ReDevPlugin A2</p>
            <h1>Opaque surface host</h1>
          </div>
          <span id="host-status" class="status-pill" data-state="opening">opening</span>
        </header>

        <dl class="metrics">
          <div><dt>Sandbox</dt><dd id="sandbox-mode">opaque</dd></div>
          <div><dt>Credentialless</dt><dd id="credentialless-mode">detecting</dd></div>
          <div><dt>Opening progress</dt><dd id="opening-progress">0</dd></div>
          <div><dt>Confirmations</dt><dd id="confirmation-count">0</dd></div>
        </dl>

        <div class="button-row">
          <button id="send-visible" type="button">Visible</button>
          <button id="send-hidden" type="button" class="secondary">Hidden</button>
          <button id="dispose-surface" type="button" class="danger">Dispose</button>
          <button id="reopen-surface" type="button" class="secondary">Reopen</button>
        </div>

        <section id="confirmation-panel" class="confirmation-panel" aria-label="Confirmation request" hidden>
          <p class="eyebrow">Confirmation required</p>
          <strong id="confirmation-method">-</strong>
          <code id="confirmation-hash">-</code>
          <div class="button-row">
            <button id="deny-confirmation" type="button" class="secondary">Deny</button>
            <button id="approve-confirmation" type="button">Approve</button>
          </div>
        </section>

        <ol id="event-log" class="event-log" aria-label="Sanitized host event log"></ol>
      </aside>

      <section class="surface-stage" aria-label="Sandboxed plugin surface">
        <header class="surface-header">
          <div>
            <p class="eyebrow">Trusted renderer + Dedicated Worker</p>
            <h2>Plugin surface</h2>
          </div>
          <span>MessagePort only</span>
        </header>
        <div id="plugin-surface-mount"></div>
      </section>
    </main>
    <script type="module" src="./host.mjs"></script>
  </body>
</html>
