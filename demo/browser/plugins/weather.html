<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Weather Plugin</title>
    <link rel="stylesheet" href="../styles.css" />
  </head>
  <body class="plugin-body weather-body">
    <main class="plugin-shell weather-shell">
      <div class="plugin-header">
        <div>
          <p class="eyebrow">demo.plugin.network</p>
          <h1>Weather atlas</h1>
        </div>
        <span id="plugin-status" class="status-pill">booting</span>
      </div>

      <div id="weather-form" class="weather-search">
        <input id="weather-location" autocomplete="off" placeholder="City or region" />
        <button id="weather-fetch" type="button">Fetch</button>
      </div>
      <div id="saved-locations" class="saved-locations" aria-label="Saved weather locations"></div>

      <section class="weather-card" aria-label="Parsed weather result">
        <div>
          <span class="metric-label">saved location</span>
          <strong id="weather-place">-</strong>
        </div>
        <div class="weather-temp"><span id="weather-temp">--</span><small>°C</small></div>
        <p id="weather-condition">Waiting for network response...</p>
        <div class="weather-metrics" aria-label="Parsed weather metrics">
          <span>Wind <strong id="weather-wind">--</strong></span>
          <span>Humidity <strong id="weather-humidity">--</strong></span>
          <span>Pressure <strong id="weather-pressure">--</strong></span>
          <span>UV <strong id="weather-uv">--</strong></span>
        </div>
        <div class="network-strip" aria-label="Network broker metadata">
          <span id="network-operation">network idle</span>
          <strong id="network-latency">-- ms</strong>
          <small id="network-bytes">-- bytes</small>
        </div>
        <div id="forecast" class="forecast-strip"></div>
        <div id="hourly" class="hourly-strip" aria-label="Hourly weather"></div>
      </section>

      <section class="network-debug-panel" aria-label="Network parsing details">
        <div>
          <span class="metric-label">connector</span>
          <strong id="network-connector">weather_api</strong>
        </div>
        <div>
          <span class="metric-label">broker</span>
          <strong id="network-broker">waiting</strong>
        </div>
        <div>
          <span class="metric-label">response</span>
          <strong id="network-response">waiting</strong>
        </div>
        <div>
          <span class="metric-label">parser</span>
          <strong id="network-parser">json</strong>
        </div>
        <pre id="raw-weather-response">{}</pre>
      </section>

      <section class="result-panel" aria-label="Weather plugin result">
        <span class="metric-label">network result</span>
        <pre id="plugin-result">{}</pre>
      </section>
    </main>
    <script type="module" src="./weather.mjs"></script>
  </body>
</html>
