<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bouncer Game Plugin</title>
    <link rel="stylesheet" href="../styles.css" />
  </head>
  <body class="plugin-body arcade-body">
    <main class="plugin-shell arcade-shell">
      <div class="plugin-header">
        <div>
          <p class="eyebrow">demo.plugin.game</p>
          <h1>Neon bouncer</h1>
        </div>
        <span id="plugin-status" class="status-pill">booting</span>
      </div>

      <section class="arcade-board" aria-label="Animated bouncing ball game">
        <canvas id="game-canvas" width="860" height="420"></canvas>
        <div class="arcade-hud">
          <span>Score <strong id="score">0</strong></span>
          <span>Best <strong id="best-score">0</strong></span>
          <span>Level <strong id="level">1</strong></span>
          <span>Combo <strong id="combo">0</strong></span>
          <span>Bricks <strong id="bricks-cleared">0</strong></span>
          <span>Speed <strong id="speed">1.0x</strong></span>
        </div>
      </section>

      <section class="arcade-telemetry" aria-label="Game runtime telemetry">
        <div>
          <span class="metric-label">energy</span>
          <strong id="energy">100%</strong>
        </div>
        <div>
          <span class="metric-label">lives</span>
          <strong id="lives">3</strong>
        </div>
        <div>
          <span class="metric-label">power-ups</span>
          <strong id="powerups">0</strong>
        </div>
        <div>
          <span class="metric-label">elapsed</span>
          <strong id="elapsed">0s</strong>
        </div>
      </section>

      <div class="button-row">
        <button id="game-toggle" type="button">Pause</button>
        <button id="game-reset" type="button" class="ghost-button">Reset</button>
        <button id="game-boost" type="button" class="secondary-button">Boost</button>
        <button id="game-powerup" type="button" class="secondary-button">Power-up</button>
        <button id="game-save" type="button" class="secondary-button">Save score</button>
      </div>

      <section class="leaderboard-panel" aria-label="Saved game leaderboard">
        <span class="metric-label">saved leaderboard</span>
        <ol id="leaderboard"></ol>
      </section>

      <section class="result-panel" aria-label="Game plugin result">
        <span class="metric-label">backend result</span>
        <pre id="plugin-result">{}</pre>
      </section>
    </main>
    <script type="module" src="./bouncer.mjs"></script>
  </body>
</html>
