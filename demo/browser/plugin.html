<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Demo Plugin</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="plugin-body">
    <main class="plugin-shell">
      <div class="plugin-header">
        <div>
          <p class="eyebrow">demo.plugin.surface</p>
          <h1>Workspace tools</h1>
        </div>
        <span id="plugin-status" class="status-pill">booting</span>
      </div>

      <div class="button-row">
        <button id="call-echo" type="button">Echo</button>
        <button id="call-list" type="button" class="secondary-button">List files</button>
        <button id="call-stream" type="button" class="secondary-button">Tail logs</button>
        <button id="call-dangerous" type="button" class="danger-button">Delete cache</button>
      </div>

      <section class="result-panel" aria-label="Plugin result">
        <span class="metric-label">latest result</span>
        <pre id="plugin-result">{}</pre>
      </section>
    </main>
    <script type="module" src="./plugin.mjs"></script>
  </body>
</html>
