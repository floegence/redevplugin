openapi: 3.1.0
info:
  title: ReDevPlugin Plugin Platform API
  version: plugin-platform-v1
  description: Host-agnostic plugin management, bridge, operation, data, and sandbox routes. Install and update trust_state fields are requested trust outcomes; the Host library must resolve runnable verified/bundled trust through a PackageTrustVerifier before records can become runnable.
paths:
  /_redevplugin/api/plugins/install:
    post:
      operationId: installPlugin
      parameters:
        - $ref: "#/components/parameters/OwnerSessionHashHeader"
      requestBody:
        $ref: "#/components/requestBodies/InstallRequest"
      responses:
        "200": { $ref: "#/components/responses/Envelope" }
  /_redevplugin/api/plugins/enable:
    post:
      operationId: enablePlugin
      parameters:
        - $ref: "#/components/parameters/OwnerSessionHashHeader"
      requestBody:
        $ref: "#/components/requestBodies/EnableRequest"
      responses:
        "200": { $ref: "#/components/responses/Envelope" }
  /_redevplugin/api/plugins/disable:
    post:
      operationId: disablePlugin
      parameters:
        - $ref: "#/components/parameters/OwnerSessionHashHeader"
      requestBody:
        $ref: "#/components/requestBodies/DisableRequest"
      responses:
        "200": { $ref: "#/components/responses/Envelope" }
  /_redevplugin/api/plugins/uninstall:
    post:
      operationId: uninstallPlugin
      parameters:
        - $ref: "#/components/parameters/OwnerSessionHashHeader"
      requestBody:
        $ref: "#/components/requestBodies/UninstallRequest"
      responses:
        "200": { $ref: "#/components/responses/Envelope" }
  /_redevplugin/api/plugins/update:
    post:
      operationId: updatePlugin
      parameters:
        - $ref: "#/components/parameters/OwnerSessionHashHeader"
      requestBody:
        $ref: "#/components/requestBodies/UpdateRequest"
      responses:
        "200": { $ref: "#/components/responses/Envelope" }
  /_redevplugin/api/plugins/downgrade:
    post:
      operationId: downgradePlugin
      parameters:
        - $ref: "#/components/parameters/OwnerSessionHashHeader"
      requestBody:
        $ref: "#/components/requestBodies/DowngradeRequest"
      responses:
        "200": { $ref: "#/components/responses/Envelope" }
  /_redevplugin/api/plugins/catalog:
    get:
      operationId: listPlugins
      responses:
        "200": { $ref: "#/components/responses/Envelope" }
  /_redevplugin/api/plugins/platform/compatibility:
    get:
      operationId: getPluginPlatformCompatibility
      description: Returns the host-consumable ReDevPlugin compatibility manifest for the mounted platform artifact set.
      responses:
        "200": { $ref: "#/components/responses/Envelope" }
  /_redevplugin/api/plugins/surfaces/open:
    post:
      operationId: openPluginSurface
      parameters:
        - $ref: "#/components/parameters/OwnerSessionHashHeader"
      requestBody:
        $ref: "#/components/requestBodies/OpenSurfaceRequest"
      responses:
        "200": { $ref: "#/components/responses/Envelope" }
  /_redevplugin/api/plugins/surfaces/{surface_instance_id}/bootstrap:
    post:
      operationId: createSurfaceBootstrap
      parameters:
        - $ref: "#/components/parameters/SurfaceInstanceID"
        - $ref: "#/components/parameters/OwnerSessionHashHeader"
      requestBody:
        $ref: "#/components/requestBodies/ExchangeAssetTicketRequest"
      responses:
        "200": { $ref: "#/components/responses/Envelope" }
  /_redevplugin/api/plugins/surfaces/{surface_instance_id}/bridge-token:
    post:
      operationId: createSurfaceBridgeToken
      parameters:
        - $ref: "#/components/parameters/SurfaceInstanceID"
        - $ref: "#/components/parameters/OwnerSessionHashHeader"
      requestBody:
        $ref: "#/components/requestBodies/BridgeTokenRequest"
      responses:
        "200": { $ref: "#/components/responses/Envelope" }
  /_redevplugin/api/plugins/rpc:
    post:
      operationId: callPluginMethod
      parameters:
        - $ref: "#/components/parameters/OwnerSessionHashHeader"
      requestBody:
        $ref: "#/components/requestBodies/RPCRequest"
      responses:
        "200": { $ref: "#/components/responses/Envelope" }
  /_redevplugin/api/plugins/confirm:
    post:
      operationId: confirmPluginIntent
      parameters:
        - $ref: "#/components/parameters/OwnerSessionHashHeader"
      requestBody:
        $ref: "#/components/requestBodies/RPCRequest"
      responses:
        "200": { $ref: "#/components/responses/Envelope" }
  /_redevplugin/api/plugins/intents:
    get:
      operationId: listPluginIntents
      description: Lists enabled, runnable plugin intents available to host-mediated interop. The response data is `{ "intents": [...] }`.
      responses:
        "200": { $ref: "#/components/responses/Envelope" }
  /_redevplugin/api/plugins/intents/invoke:
    post:
      operationId: invokePluginIntent
      description: Invokes a host-mediated plugin intent without iframe gateway tokens while preserving local policy, permission grants, and dangerous-method fail-closed checks.
      parameters:
        - $ref: "#/components/parameters/OwnerSessionHashHeader"
      requestBody:
        $ref: "#/components/requestBodies/InvokeIntentRequest"
      responses:
        "200": { $ref: "#/components/responses/Envelope" }
  /_redevplugin/api/plugins/operations:
    get:
      operationId: listPluginOperations
      responses:
        "200": { $ref: "#/components/responses/Envelope" }
  /_redevplugin/api/plugins/operations/{operation_id}:
    get:
      operationId: getPluginOperation
      parameters:
        - $ref: "#/components/parameters/OperationID"
      responses:
        "200": { $ref: "#/components/responses/Envelope" }
  /_redevplugin/api/plugins/operations/{operation_id}/cancel:
    post:
      operationId: cancelPluginOperation
      parameters:
        - $ref: "#/components/parameters/OperationID"
        - $ref: "#/components/parameters/OwnerSessionHashHeader"
      requestBody:
        $ref: "#/components/requestBodies/CancelOperationRequest"
      responses:
        "200": { $ref: "#/components/responses/Envelope" }
  /_redevplugin/api/plugins/runtime/start:
    post:
      operationId: startPluginRuntime
      parameters:
        - $ref: "#/components/parameters/OwnerSessionHashHeader"
      requestBody:
        $ref: "#/components/requestBodies/StartRuntimeRequest"
      responses:
        "200": { $ref: "#/components/responses/Envelope" }
  /_redevplugin/api/plugins/runtime/stop:
    post:
      operationId: stopPluginRuntime
      parameters:
        - $ref: "#/components/parameters/OwnerSessionHashHeader"
      responses:
        "200": { $ref: "#/components/responses/Envelope" }
  /_redevplugin/api/plugins/runtime/health:
    get:
      operationId: getPluginRuntimeHealth
      responses:
        "200": { $ref: "#/components/responses/Envelope" }
  /_redevplugin/api/plugins/data/export:
    post:
      operationId: exportPluginData
      parameters:
        - $ref: "#/components/parameters/OwnerSessionHashHeader"
      requestBody:
        $ref: "#/components/requestBodies/ExportDataRequest"
      responses:
        "200": { $ref: "#/components/responses/Envelope" }
  /_redevplugin/api/plugins/data/import:
    post:
      operationId: importPluginData
      parameters:
        - $ref: "#/components/parameters/OwnerSessionHashHeader"
      requestBody:
        $ref: "#/components/requestBodies/ImportDataRequest"
      responses:
        "200": { $ref: "#/components/responses/Envelope" }
  /_redevplugin/api/plugins/permissions:
    get:
      operationId: listPluginPermissionGrants
      responses:
        "200": { $ref: "#/components/responses/Envelope" }
  /_redevplugin/api/plugins/permissions/grant:
    post:
      operationId: grantPluginPermission
      parameters:
        - $ref: "#/components/parameters/OwnerSessionHashHeader"
      requestBody:
        $ref: "#/components/requestBodies/GrantPermissionRequest"
      responses:
        "200": { $ref: "#/components/responses/Envelope" }
  /_redevplugin/api/plugins/permissions/revoke:
    post:
      operationId: revokePluginPermission
      parameters:
        - $ref: "#/components/parameters/OwnerSessionHashHeader"
      requestBody:
        $ref: "#/components/requestBodies/RevokePermissionRequest"
      responses:
        "200": { $ref: "#/components/responses/Envelope" }
  /_redevplugin/api/plugins/audit:
    get:
      operationId: listPluginAuditEvents
      responses:
        "200": { $ref: "#/components/responses/Envelope" }
  /_redevplugin/api/plugins/diagnostics:
    get:
      operationId: listPluginDiagnosticEvents
      responses:
        "200": { $ref: "#/components/responses/Envelope" }
  /_redevplugin/api/plugins/secrets/bind:
    post:
      operationId: bindPluginSecret
      parameters:
        - $ref: "#/components/parameters/OwnerSessionHashHeader"
      requestBody:
        $ref: "#/components/requestBodies/SecretRefRequest"
      responses:
        "200": { $ref: "#/components/responses/Envelope" }
  /_redevplugin/api/plugins/secrets/test:
    post:
      operationId: testPluginSecret
      parameters:
        - $ref: "#/components/parameters/OwnerSessionHashHeader"
      requestBody:
        $ref: "#/components/requestBodies/SecretRefRequest"
      responses:
        "200": { $ref: "#/components/responses/Envelope" }
  /_redevplugin/api/plugins/secrets/delete:
    post:
      operationId: deletePluginSecret
      parameters:
        - $ref: "#/components/parameters/OwnerSessionHashHeader"
      requestBody:
        $ref: "#/components/requestBodies/SecretRefRequest"
      responses:
        "200": { $ref: "#/components/responses/Envelope" }
  /_redevplugin/api/plugins/{plugin_instance_id}/settings/schema:
    get:
      operationId: getPluginSettingsSchema
      parameters:
        - $ref: "#/components/parameters/PluginInstanceID"
      responses:
        "200": { $ref: "#/components/responses/Envelope" }
  /_redevplugin/api/plugins/{plugin_instance_id}/settings:
    get:
      operationId: getPluginSettings
      parameters:
        - $ref: "#/components/parameters/PluginInstanceID"
      responses:
        "200": { $ref: "#/components/responses/Envelope" }
    patch:
      operationId: patchPluginSettings
      parameters:
        - $ref: "#/components/parameters/PluginInstanceID"
        - $ref: "#/components/parameters/OwnerSessionHashHeader"
      requestBody:
        $ref: "#/components/requestBodies/PatchSettingsRequest"
      responses:
        "200": { $ref: "#/components/responses/Envelope" }
  /_redevplugin/bootstrap:
    post:
      operationId: exchangePluginAssetTicket
      requestBody:
        $ref: "#/components/requestBodies/SandboxBootstrapRequest"
      responses:
        "200": { $ref: "#/components/responses/Envelope" }
  /_redevplugin/assets/{asset_path...}:
    get:
      operationId: getPluginAsset
      parameters:
        - name: asset_path...
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Plugin package asset.
  /_redevplugin/stream/{stream_id}:
    get:
      operationId: getPluginStream
      parameters:
        - name: stream_id
          in: path
          required: true
          schema: { type: string }
        - name: ticket
          in: query
          required: true
          schema: { type: string }
          description: Single-use stream ticket returned by the RPC call that created the stream.
      responses:
        "200":
          description: Plugin stream events drained as newline-delimited JSON.
          content:
            application/x-ndjson:
              schema:
                type: string
                description: One JSON StreamEvent object per line.
  /_redevplugin/csp-report:
    post:
      operationId: reportPluginCSPViolation
      requestBody:
        $ref: "#/components/requestBodies/CSPReportRequest"
      responses:
        "200": { $ref: "#/components/responses/Envelope" }
components:
  parameters:
    OperationID:
      name: operation_id
      in: path
      required: true
      schema: { type: string }
    PluginInstanceID:
      name: plugin_instance_id
      in: path
      required: true
      schema: { type: string }
    SurfaceInstanceID:
      name: surface_instance_id
      in: path
      required: true
      schema: { type: string }
    OwnerSessionHashHeader:
      name: X-ReDevPlugin-Owner-Session-Hash
      in: header
      required: false
      schema: { type: string }
      description: Optional host session binding value passed to the configured WebSecurity guard for CSRF validation.
  responses:
    Envelope:
      description: Flat host envelope used by host product HTTP integration.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Envelope"
  requestBodies:
    InstallRequest:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/InstallRequest"
    UpdateRequest:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/UpdateRequest"
    DowngradeRequest:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/DowngradeRequest"
    EnableRequest:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/EnableRequest"
    DisableRequest:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/DisableRequest"
    UninstallRequest:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/UninstallRequest"
    OpenSurfaceRequest:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/OpenSurfaceRequest"
    ExchangeAssetTicketRequest:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ExchangeAssetTicketRequest"
    BridgeTokenRequest:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/BridgeTokenRequest"
    RPCRequest:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/RPCRequest"
    InvokeIntentRequest:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/InvokeIntentRequest"
    CancelOperationRequest:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/CancelOperationRequest"
    StartRuntimeRequest:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/StartRuntimeRequest"
    ExportDataRequest:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ExportDataRequest"
    ImportDataRequest:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ImportDataRequest"
    GrantPermissionRequest:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/GrantPermissionRequest"
    RevokePermissionRequest:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/RevokePermissionRequest"
    SecretRefRequest:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/SecretRefRequest"
    PatchSettingsRequest:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/PatchSettingsRequest"
    SandboxBootstrapRequest:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/SandboxBootstrapRequest"
    CSPReportRequest:
      required: true
      content:
        application/json:
          schema:
            type: object
            additionalProperties: true
  schemas:
    Envelope:
      type: object
      required: [ok]
      properties:
        ok: { type: boolean }
        data: true
        error: { type: string }
        error_code:
          $ref: "#/components/schemas/ErrorCode"
    ErrorCode:
      type: string
      enum:
        - PLUGIN_INVALID_REQUEST
        - PLUGIN_PERMISSION_DENIED
        - PLUGIN_CONFIRMATION_REQUIRED
        - PLUGIN_TOKEN_EXPIRED
        - PLUGIN_TOKEN_REPLAY
        - PLUGIN_GATEWAY_TOKEN_CHANNEL_MISMATCH
        - PLUGIN_STORAGE_QUOTA_EXCEEDED
        - PLUGIN_OPERATION_BLOCKED
        - PLUGIN_NETWORK_TARGET_DENIED
        - PLUGIN_RUNTIME_UNAVAILABLE
        - PLUGIN_CONTRACT_MISMATCH
    TrustState:
      type: string
      enum: [bundled, verified, unsigned_local, untrusted, needs_review, blocked_security]
    InstallRequest:
      type: object
      required: [package_base64]
      additionalProperties: false
      properties:
        package_base64: { type: string, contentEncoding: base64, minLength: 1 }
        trust_state:
          $ref: "#/components/schemas/TrustState"
        plugin_instance_id: { type: string, minLength: 1 }
    UpdateRequest:
      type: object
      required: [plugin_instance_id, package_base64]
      additionalProperties: false
      properties:
        plugin_instance_id: { type: string, minLength: 1 }
        package_base64: { type: string, contentEncoding: base64, minLength: 1 }
        trust_state:
          $ref: "#/components/schemas/TrustState"
    DowngradeRequest:
      type: object
      required: [plugin_instance_id]
      additionalProperties: false
      properties:
        plugin_instance_id: { type: string, minLength: 1 }
        version: { type: string }
        package_hash: { type: string }
    EnableRequest:
      type: object
      required: [plugin_instance_id]
      additionalProperties: false
      properties:
        plugin_instance_id: { type: string, minLength: 1 }
    DisableRequest:
      type: object
      required: [plugin_instance_id]
      additionalProperties: false
      properties:
        plugin_instance_id: { type: string, minLength: 1 }
        reason: { type: string }
    UninstallRequest:
      type: object
      required: [plugin_instance_id, delete_data]
      additionalProperties: false
      properties:
        plugin_instance_id: { type: string, minLength: 1 }
        delete_data: { type: boolean }
    OpenSurfaceRequest:
      type: object
      required: [plugin_instance_id, surface_id]
      additionalProperties: false
      properties:
        plugin_instance_id: { type: string, minLength: 1 }
        surface_id: { type: string, minLength: 1 }
        surface_instance_id: { type: string }
        owner_session_hash: { type: string }
        owner_user_hash: { type: string }
        session_channel_id_hash: { type: string }
        sandbox_origin: { type: string }
    ExchangeAssetTicketRequest:
      type: object
      required: [asset_ticket]
      additionalProperties: false
      properties:
        asset_ticket: { type: string, minLength: 1 }
    BridgeHandshake:
      type: object
      required: [plugin_id, surface_id, surface_instance_id, active_fingerprint, bridge_nonce, ui_protocol_version]
      additionalProperties: false
      properties:
        type: { const: redevplugin.bridge.handshake }
        plugin_id: { type: string, minLength: 1 }
        surface_id: { type: string, minLength: 1 }
        surface_instance_id: { type: string, minLength: 1 }
        active_fingerprint: { type: string, minLength: 1 }
        bridge_nonce: { type: string, minLength: 1 }
        ui_protocol_version: { const: plugin-ui-v1 }
    BridgeTokenRequest:
      type: object
      required: [handshake, bridge_channel_id]
      additionalProperties: false
      properties:
        handshake:
          $ref: "#/components/schemas/BridgeHandshake"
        bridge_channel_id: { type: string, minLength: 1 }
    RPCRequest:
      type: object
      required: [plugin_instance_id, surface_instance_id, bridge_channel_id, plugin_gateway_token, method]
      additionalProperties: false
      properties:
        plugin_instance_id: { type: string, minLength: 1 }
        surface_instance_id: { type: string, minLength: 1 }
        session_channel_id_hash: { type: string }
        owner_session_hash: { type: string }
        owner_user_hash: { type: string }
        bridge_channel_id: { type: string, minLength: 1 }
        plugin_gateway_token: { type: string, minLength: 1 }
        confirmation_token: { type: string }
        method: { type: string, minLength: 1 }
        params:
          type: object
          additionalProperties: true
    InvokeIntentRequest:
      type: object
      required: [intent_id]
      additionalProperties: false
      properties:
        plugin_instance_id: { type: string }
        intent_id: { type: string, minLength: 1 }
        params:
          type: object
          additionalProperties: true
        owner_session_hash: { type: string }
        owner_user_hash: { type: string }
        session_channel_id_hash: { type: string }
    CancelOperationRequest:
      type: object
      additionalProperties: false
      properties:
        reason: { type: string }
    StartRuntimeRequest:
      type: object
      additionalProperties: false
      properties:
        target:
          type: object
          additionalProperties: false
          properties:
            os: { type: string }
            arch: { type: string }
    ExportDataRequest:
      type: object
      required: [plugin_instance_id]
      additionalProperties: false
      properties:
        plugin_instance_id: { type: string, minLength: 1 }
        include_secrets: { type: boolean }
    ImportDataRequest:
      type: object
      required: [plugin_instance_id]
      additionalProperties: false
      description: At least one of archive_ref or settings_archive_ref must be supplied. Storage archive refs and settings archive refs are separated so settings secrets can remain redacted and require rebinding after import.
      properties:
        plugin_instance_id: { type: string, minLength: 1 }
        archive_ref: { type: string, minLength: 1 }
        settings_archive_ref: { type: string, minLength: 1 }
        delete_existing: { type: boolean }
    GrantPermissionRequest:
      type: object
      required: [plugin_instance_id, permission_id]
      additionalProperties: false
      properties:
        plugin_instance_id: { type: string, minLength: 1 }
        permission_id: { type: string, minLength: 1 }
        granted_by: { type: string }
        expires_at: { type: string, format: date-time }
    RevokePermissionRequest:
      type: object
      required: [plugin_instance_id, permission_id]
      additionalProperties: false
      properties:
        plugin_instance_id: { type: string, minLength: 1 }
        permission_id: { type: string, minLength: 1 }
        revoked_by: { type: string }
        reason: { type: string }
    SecretRefRequest:
      type: object
      required: [plugin_instance_id, secret_ref, scope]
      additionalProperties: false
      properties:
        plugin_instance_id: { type: string, minLength: 1 }
        secret_ref: { type: string, minLength: 1 }
        scope: { type: string, enum: [user, environment] }
    PatchSettingsRequest:
      type: object
      required: [values]
      additionalProperties: false
      properties:
        values:
          type: object
          additionalProperties: true
    SandboxBootstrapRequest:
      type: object
      required: [surface_instance_id, asset_ticket]
      additionalProperties: false
      properties:
        surface_instance_id: { type: string, minLength: 1 }
        asset_ticket: { type: string, minLength: 1 }
