openapi: 3.1.0
info:
  title: ReDevPlugin Plugin Platform API
  version: plugin-platform-v1
  description: Host-agnostic plugin management, bridge, operation, data, and sandbox routes. Install and update trust_state fields are requested trust outcomes; the Host library must resolve runnable verified/bundled trust through a PackageTrustVerifier before records can become runnable.
paths:
  /_redeven_proxy/api/plugins/install:
    post:
      operationId: installPlugin
      parameters:
        - $ref: "#/components/parameters/OwnerSessionHashHeader"
      responses:
        "200": { $ref: "#/components/responses/Envelope" }
  /_redeven_proxy/api/plugins/enable:
    post:
      operationId: enablePlugin
      parameters:
        - $ref: "#/components/parameters/OwnerSessionHashHeader"
      responses:
        "200": { $ref: "#/components/responses/Envelope" }
  /_redeven_proxy/api/plugins/disable:
    post:
      operationId: disablePlugin
      parameters:
        - $ref: "#/components/parameters/OwnerSessionHashHeader"
      responses:
        "200": { $ref: "#/components/responses/Envelope" }
  /_redeven_proxy/api/plugins/uninstall:
    post:
      operationId: uninstallPlugin
      parameters:
        - $ref: "#/components/parameters/OwnerSessionHashHeader"
      responses:
        "200": { $ref: "#/components/responses/Envelope" }
  /_redeven_proxy/api/plugins/update:
    post:
      operationId: updatePlugin
      parameters:
        - $ref: "#/components/parameters/OwnerSessionHashHeader"
      responses:
        "200": { $ref: "#/components/responses/Envelope" }
  /_redeven_proxy/api/plugins/downgrade:
    post:
      operationId: downgradePlugin
      parameters:
        - $ref: "#/components/parameters/OwnerSessionHashHeader"
      responses:
        "200": { $ref: "#/components/responses/Envelope" }
  /_redeven_proxy/api/plugins/catalog:
    get:
      operationId: listPlugins
      responses:
        "200": { $ref: "#/components/responses/Envelope" }
  /_redeven_proxy/api/plugins/surfaces/open:
    post:
      operationId: openPluginSurface
      parameters:
        - $ref: "#/components/parameters/OwnerSessionHashHeader"
      responses:
        "200": { $ref: "#/components/responses/Envelope" }
  /_redeven_proxy/api/plugins/surfaces/{surface_instance_id}/bootstrap:
    post:
      operationId: createSurfaceBootstrap
      parameters:
        - $ref: "#/components/parameters/SurfaceInstanceID"
        - $ref: "#/components/parameters/OwnerSessionHashHeader"
      responses:
        "200": { $ref: "#/components/responses/Envelope" }
  /_redeven_proxy/api/plugins/surfaces/{surface_instance_id}/bridge-token:
    post:
      operationId: createSurfaceBridgeToken
      parameters:
        - $ref: "#/components/parameters/SurfaceInstanceID"
        - $ref: "#/components/parameters/OwnerSessionHashHeader"
      responses:
        "200": { $ref: "#/components/responses/Envelope" }
  /_redeven_proxy/api/plugins/rpc:
    post:
      operationId: callPluginMethod
      parameters:
        - $ref: "#/components/parameters/OwnerSessionHashHeader"
      responses:
        "200": { $ref: "#/components/responses/Envelope" }
  /_redeven_proxy/api/plugins/confirm:
    post:
      operationId: confirmPluginIntent
      parameters:
        - $ref: "#/components/parameters/OwnerSessionHashHeader"
      responses:
        "200": { $ref: "#/components/responses/Envelope" }
  /_redeven_proxy/api/plugins/operations:
    get:
      operationId: listPluginOperations
      responses:
        "200": { $ref: "#/components/responses/Envelope" }
  /_redeven_proxy/api/plugins/operations/{operation_id}:
    get:
      operationId: getPluginOperation
      parameters:
        - $ref: "#/components/parameters/OperationID"
      responses:
        "200": { $ref: "#/components/responses/Envelope" }
  /_redeven_proxy/api/plugins/operations/{operation_id}/cancel:
    post:
      operationId: cancelPluginOperation
      parameters:
        - $ref: "#/components/parameters/OperationID"
        - $ref: "#/components/parameters/OwnerSessionHashHeader"
      responses:
        "200": { $ref: "#/components/responses/Envelope" }
  /_redeven_proxy/api/plugins/runtime/start:
    post:
      operationId: startPluginRuntime
      parameters:
        - $ref: "#/components/parameters/OwnerSessionHashHeader"
      responses:
        "200": { $ref: "#/components/responses/Envelope" }
  /_redeven_proxy/api/plugins/runtime/stop:
    post:
      operationId: stopPluginRuntime
      parameters:
        - $ref: "#/components/parameters/OwnerSessionHashHeader"
      responses:
        "200": { $ref: "#/components/responses/Envelope" }
  /_redeven_proxy/api/plugins/runtime/health:
    get:
      operationId: getPluginRuntimeHealth
      responses:
        "200": { $ref: "#/components/responses/Envelope" }
  /_redeven_proxy/api/plugins/data/export:
    post:
      operationId: exportPluginData
      parameters:
        - $ref: "#/components/parameters/OwnerSessionHashHeader"
      responses:
        "200": { $ref: "#/components/responses/Envelope" }
  /_redeven_proxy/api/plugins/data/import:
    post:
      operationId: importPluginData
      parameters:
        - $ref: "#/components/parameters/OwnerSessionHashHeader"
      responses:
        "200": { $ref: "#/components/responses/Envelope" }
  /_redeven_proxy/api/plugins/permissions:
    get:
      operationId: listPluginPermissionGrants
      responses:
        "200": { $ref: "#/components/responses/Envelope" }
  /_redeven_proxy/api/plugins/permissions/grant:
    post:
      operationId: grantPluginPermission
      parameters:
        - $ref: "#/components/parameters/OwnerSessionHashHeader"
      responses:
        "200": { $ref: "#/components/responses/Envelope" }
  /_redeven_proxy/api/plugins/permissions/revoke:
    post:
      operationId: revokePluginPermission
      parameters:
        - $ref: "#/components/parameters/OwnerSessionHashHeader"
      responses:
        "200": { $ref: "#/components/responses/Envelope" }
  /_redeven_proxy/api/plugins/audit:
    get:
      operationId: listPluginAuditEvents
      responses:
        "200": { $ref: "#/components/responses/Envelope" }
  /_redeven_proxy/api/plugins/diagnostics:
    get:
      operationId: listPluginDiagnosticEvents
      responses:
        "200": { $ref: "#/components/responses/Envelope" }
  /_redeven_proxy/api/plugins/secrets/bind:
    post:
      operationId: bindPluginSecret
      parameters:
        - $ref: "#/components/parameters/OwnerSessionHashHeader"
      responses:
        "200": { $ref: "#/components/responses/Envelope" }
  /_redeven_proxy/api/plugins/secrets/test:
    post:
      operationId: testPluginSecret
      parameters:
        - $ref: "#/components/parameters/OwnerSessionHashHeader"
      responses:
        "200": { $ref: "#/components/responses/Envelope" }
  /_redeven_proxy/api/plugins/secrets/delete:
    post:
      operationId: deletePluginSecret
      parameters:
        - $ref: "#/components/parameters/OwnerSessionHashHeader"
      responses:
        "200": { $ref: "#/components/responses/Envelope" }
  /_redeven_proxy/api/plugins/{plugin_instance_id}/settings/schema:
    get:
      operationId: getPluginSettingsSchema
      parameters:
        - $ref: "#/components/parameters/PluginInstanceID"
      responses:
        "200": { $ref: "#/components/responses/Envelope" }
  /_redeven_proxy/api/plugins/{plugin_instance_id}/settings:
    get:
      operationId: getPluginSettings
      parameters:
        - $ref: "#/components/parameters/PluginInstanceID"
      responses:
        "200": { $ref: "#/components/responses/Envelope" }
    patch:
      operationId: patchPluginSettings
      parameters:
        - $ref: "#/components/parameters/PluginInstanceID"
        - $ref: "#/components/parameters/OwnerSessionHashHeader"
      responses:
        "200": { $ref: "#/components/responses/Envelope" }
  /_redeven_plugin/bootstrap:
    post:
      operationId: exchangePluginAssetTicket
      responses:
        "200": { $ref: "#/components/responses/Envelope" }
  /_redeven_plugin/assets/{asset_path...}:
    get:
      operationId: getPluginAsset
      parameters:
        - name: asset_path...
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Plugin package asset.
  /_redeven_plugin/stream/{stream_id}:
    get:
      operationId: getPluginStream
      parameters:
        - name: stream_id
          in: path
          required: true
          schema: { type: string }
        - name: ticket
          in: query
          required: true
          schema: { type: string }
          description: Single-use stream ticket returned by the RPC call that created the stream.
      responses:
        "200":
          description: Plugin stream events drained as newline-delimited JSON.
          content:
            application/x-ndjson:
              schema:
                type: string
                description: One JSON StreamEvent object per line.
  /_redeven_plugin/csp-report:
    post:
      operationId: reportPluginCSPViolation
      responses:
        "200": { $ref: "#/components/responses/Envelope" }
components:
  parameters:
    OperationID:
      name: operation_id
      in: path
      required: true
      schema: { type: string }
    PluginInstanceID:
      name: plugin_instance_id
      in: path
      required: true
      schema: { type: string }
    SurfaceInstanceID:
      name: surface_instance_id
      in: path
      required: true
      schema: { type: string }
    OwnerSessionHashHeader:
      name: X-ReDevPlugin-Owner-Session-Hash
      in: header
      required: false
      schema: { type: string }
      description: Optional host session binding value passed to the configured WebSecurity guard for CSRF validation.
  responses:
    Envelope:
      description: Flat host envelope used by Redeven appserver integration.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Envelope"
  schemas:
    Envelope:
      type: object
      required: [ok]
      properties:
        ok: { type: boolean }
        data: true
        error: { type: string }
        error_code:
          $ref: "#/components/schemas/ErrorCode"
    ErrorCode:
      type: string
      enum:
        - PLUGIN_INVALID_REQUEST
        - PLUGIN_PERMISSION_DENIED
        - PLUGIN_CONFIRMATION_REQUIRED
        - PLUGIN_TOKEN_EXPIRED
        - PLUGIN_TOKEN_REPLAY
        - PLUGIN_GATEWAY_TOKEN_CHANNEL_MISMATCH
        - PLUGIN_STORAGE_QUOTA_EXCEEDED
        - PLUGIN_OPERATION_BLOCKED
        - PLUGIN_NETWORK_TARGET_DENIED
        - PLUGIN_RUNTIME_UNAVAILABLE
        - PLUGIN_CONTRACT_MISMATCH
