openapi: 3.1.0
info:
  title: ReDevPlugin Plugin Platform API
  version: plugin-platform-v1
  description: Host-agnostic plugin management, bridge, operation, data, and sandbox routes. Install and update trust_state fields are requested trust outcomes; the Host library must resolve runnable verified/bundled trust through a PackageTrustVerifier before records can become runnable.
paths:
  /_redevplugin/api/plugins/install:
    post:
      operationId: installPlugin
      parameters:
        - $ref: "#/components/parameters/OwnerSessionHashHeader"
      requestBody:
        $ref: "#/components/requestBodies/InstallRequest"
      responses:
        "200": { $ref: "#/components/responses/Envelope" }
  /_redevplugin/api/plugins/enable:
    post:
      operationId: enablePlugin
      parameters:
        - $ref: "#/components/parameters/OwnerSessionHashHeader"
      requestBody:
        $ref: "#/components/requestBodies/EnableRequest"
      responses:
        "200": { $ref: "#/components/responses/Envelope" }
  /_redevplugin/api/plugins/disable:
    post:
      operationId: disablePlugin
      parameters:
        - $ref: "#/components/parameters/OwnerSessionHashHeader"
      requestBody:
        $ref: "#/components/requestBodies/DisableRequest"
      responses:
        "200": { $ref: "#/components/responses/Envelope" }
  /_redevplugin/api/plugins/uninstall:
    post:
      operationId: uninstallPlugin
      parameters:
        - $ref: "#/components/parameters/OwnerSessionHashHeader"
      requestBody:
        $ref: "#/components/requestBodies/UninstallRequest"
      responses:
        "200": { $ref: "#/components/responses/Envelope" }
  /_redevplugin/api/plugins/update:
    post:
      operationId: updatePlugin
      parameters:
        - $ref: "#/components/parameters/OwnerSessionHashHeader"
      requestBody:
        $ref: "#/components/requestBodies/UpdateRequest"
      responses:
        "200": { $ref: "#/components/responses/Envelope" }
  /_redevplugin/api/plugins/downgrade:
    post:
      operationId: downgradePlugin
      parameters:
        - $ref: "#/components/parameters/OwnerSessionHashHeader"
      requestBody:
        $ref: "#/components/requestBodies/DowngradeRequest"
      responses:
        "200": { $ref: "#/components/responses/Envelope" }
  /_redevplugin/api/plugins/catalog:
    get:
      operationId: listPlugins
      responses:
        "200": { $ref: "#/components/responses/Envelope" }
  /_redevplugin/api/plugins/platform/compatibility:
    get:
      operationId: getPluginPlatformCompatibility
      description: Returns the host-consumable ReDevPlugin compatibility manifest for the mounted platform artifact set.
      responses:
        "200": { $ref: "#/components/responses/Envelope" }
  /_redevplugin/api/plugins/surfaces/open:
    post:
      operationId: openPluginSurface
      parameters:
        - $ref: "#/components/parameters/OwnerSessionHashHeader"
      requestBody:
        $ref: "#/components/requestBodies/OpenSurfaceRequest"
      responses:
        "200": { $ref: "#/components/responses/Envelope" }
  /_redevplugin/api/plugins/surfaces/{surface_instance_id}/bootstrap:
    post:
      operationId: createSurfaceBootstrap
      parameters:
        - $ref: "#/components/parameters/SurfaceInstanceID"
        - $ref: "#/components/parameters/OwnerSessionHashHeader"
      requestBody:
        $ref: "#/components/requestBodies/ExchangeAssetTicketRequest"
      responses:
        "200": { $ref: "#/components/responses/Envelope" }
  /_redevplugin/api/plugins/surfaces/{surface_instance_id}/bridge-token:
    post:
      operationId: createSurfaceBridgeToken
      parameters:
        - $ref: "#/components/parameters/SurfaceInstanceID"
        - $ref: "#/components/parameters/OwnerSessionHashHeader"
      requestBody:
        $ref: "#/components/requestBodies/BridgeTokenRequest"
      responses:
        "200": { $ref: "#/components/responses/Envelope" }
  /_redevplugin/api/plugins/rpc:
    post:
      operationId: callPluginMethod
      parameters:
        - $ref: "#/components/parameters/OwnerSessionHashHeader"
      requestBody:
        $ref: "#/components/requestBodies/RPCRequest"
      responses:
        "200": { $ref: "#/components/responses/Envelope" }
  /_redevplugin/api/plugins/confirm:
    post:
      operationId: confirmPluginIntent
      parameters:
        - $ref: "#/components/parameters/OwnerSessionHashHeader"
      requestBody:
        $ref: "#/components/requestBodies/RPCRequest"
      responses:
        "200": { $ref: "#/components/responses/ConfirmEnvelope" }
  /_redevplugin/api/plugins/intents:
    get:
      operationId: listPluginIntents
      description: Lists enabled, runnable plugin intents available to host-mediated interop. The response data is `{ "intents": [...] }`.
      responses:
        "200": { $ref: "#/components/responses/Envelope" }
  /_redevplugin/api/plugins/intents/invoke:
    post:
      operationId: invokePluginIntent
      description: Invokes a host-mediated plugin intent without iframe gateway tokens while preserving local policy, permission grants, and dangerous-method fail-closed checks.
      parameters:
        - $ref: "#/components/parameters/OwnerSessionHashHeader"
      requestBody:
        $ref: "#/components/requestBodies/InvokeIntentRequest"
      responses:
        "200": { $ref: "#/components/responses/Envelope" }
  /_redevplugin/api/plugins/operations:
    get:
      operationId: listPluginOperations
      responses:
        "200": { $ref: "#/components/responses/Envelope" }
  /_redevplugin/api/plugins/operations/{operation_id}:
    get:
      operationId: getPluginOperation
      parameters:
        - $ref: "#/components/parameters/OperationID"
      responses:
        "200": { $ref: "#/components/responses/Envelope" }
  /_redevplugin/api/plugins/operations/{operation_id}/cancel:
    post:
      operationId: cancelPluginOperation
      parameters:
        - $ref: "#/components/parameters/OperationID"
        - $ref: "#/components/parameters/OwnerSessionHashHeader"
      requestBody:
        $ref: "#/components/requestBodies/CancelOperationRequest"
      responses:
        "200": { $ref: "#/components/responses/Envelope" }
  /_redevplugin/api/plugins/runtime/start:
    post:
      operationId: startPluginRuntime
      parameters:
        - $ref: "#/components/parameters/OwnerSessionHashHeader"
      requestBody:
        $ref: "#/components/requestBodies/StartRuntimeRequest"
      responses:
        "200": { $ref: "#/components/responses/Envelope" }
  /_redevplugin/api/plugins/runtime/stop:
    post:
      operationId: stopPluginRuntime
      parameters:
        - $ref: "#/components/parameters/OwnerSessionHashHeader"
      responses:
        "200": { $ref: "#/components/responses/Envelope" }
  /_redevplugin/api/plugins/runtime/refresh-enabled:
    post:
      operationId: refreshEnabledPluginRuntimeState
      description: Replays runtime-derived state for enabled plugins after the embedding host process restarts or reattaches adapters. The response data is `{ "refreshed_plugins": [...] }`.
      parameters:
        - $ref: "#/components/parameters/OwnerSessionHashHeader"
      responses:
        "200": { $ref: "#/components/responses/Envelope" }
  /_redevplugin/api/plugins/runtime/health:
    get:
      operationId: getPluginRuntimeHealth
      responses:
        "200": { $ref: "#/components/responses/Envelope" }
  /_redevplugin/api/plugins/data/export:
    post:
      operationId: exportPluginData
      parameters:
        - $ref: "#/components/parameters/OwnerSessionHashHeader"
      requestBody:
        $ref: "#/components/requestBodies/ExportDataRequest"
      responses:
        "200": { $ref: "#/components/responses/Envelope" }
  /_redevplugin/api/plugins/data/import:
    post:
      operationId: importPluginData
      parameters:
        - $ref: "#/components/parameters/OwnerSessionHashHeader"
      requestBody:
        $ref: "#/components/requestBodies/ImportDataRequest"
      responses:
        "200": { $ref: "#/components/responses/Envelope" }
  /_redevplugin/api/plugins/retained-data:
    get:
      operationId: listPluginRetainedData
      parameters:
        - name: publisher_id
          in: query
          schema: { type: string }
        - name: plugin_id
          in: query
          schema: { type: string }
        - name: source_plugin_instance_id
          in: query
          schema: { type: string }
        - name: state
          in: query
          schema:
            $ref: "#/components/schemas/RetainedDataState"
      responses:
        "200": { $ref: "#/components/responses/RetainedDataListEnvelope" }
  /_redevplugin/api/plugins/retained-data/delete:
    post:
      operationId: deletePluginRetainedData
      parameters:
        - $ref: "#/components/parameters/OwnerSessionHashHeader"
      requestBody:
        $ref: "#/components/requestBodies/DeleteRetainedDataRequest"
      responses:
        "200": { $ref: "#/components/responses/RetainedDataRecordEnvelope" }
        "409": { $ref: "#/components/responses/RetainedDataRecordEnvelope" }
  /_redevplugin/api/plugins/retained-data/bind:
    post:
      operationId: bindPluginRetainedData
      parameters:
        - $ref: "#/components/parameters/OwnerSessionHashHeader"
      requestBody:
        $ref: "#/components/requestBodies/BindRetainedDataRequest"
      responses:
        "200": { $ref: "#/components/responses/RetainedDataRecordEnvelope" }
        "409": { $ref: "#/components/responses/RetainedDataRecordEnvelope" }
  /_redevplugin/api/plugins/retained-data/cleanup-expired:
    post:
      operationId: cleanupExpiredPluginRetainedData
      parameters:
        - $ref: "#/components/parameters/OwnerSessionHashHeader"
      requestBody:
        $ref: "#/components/requestBodies/CleanupExpiredRetainedDataRequest"
      responses:
        "200": { $ref: "#/components/responses/RetainedDataCleanupEnvelope" }
        "409": { $ref: "#/components/responses/RetainedDataCleanupEnvelope" }
  /_redevplugin/api/plugins/permissions:
    get:
      operationId: listPluginPermissionGrants
      responses:
        "200": { $ref: "#/components/responses/Envelope" }
  /_redevplugin/api/plugins/permissions/grant:
    post:
      operationId: grantPluginPermission
      parameters:
        - $ref: "#/components/parameters/OwnerSessionHashHeader"
      requestBody:
        $ref: "#/components/requestBodies/GrantPermissionRequest"
      responses:
        "200": { $ref: "#/components/responses/Envelope" }
  /_redevplugin/api/plugins/permissions/revoke:
    post:
      operationId: revokePluginPermission
      parameters:
        - $ref: "#/components/parameters/OwnerSessionHashHeader"
      requestBody:
        $ref: "#/components/requestBodies/RevokePermissionRequest"
      responses:
        "200": { $ref: "#/components/responses/Envelope" }
  /_redevplugin/api/plugins/audit:
    get:
      operationId: listPluginAuditEvents
      responses:
        "200": { $ref: "#/components/responses/Envelope" }
  /_redevplugin/api/plugins/diagnostics:
    get:
      operationId: listPluginDiagnosticEvents
      responses:
        "200": { $ref: "#/components/responses/Envelope" }
  /_redevplugin/api/plugins/secrets/bind:
    post:
      operationId: bindPluginSecret
      parameters:
        - $ref: "#/components/parameters/OwnerSessionHashHeader"
      requestBody:
        $ref: "#/components/requestBodies/SecretRefRequest"
      responses:
        "200": { $ref: "#/components/responses/Envelope" }
  /_redevplugin/api/plugins/secrets/test:
    post:
      operationId: testPluginSecret
      parameters:
        - $ref: "#/components/parameters/OwnerSessionHashHeader"
      requestBody:
        $ref: "#/components/requestBodies/SecretRefRequest"
      responses:
        "200": { $ref: "#/components/responses/Envelope" }
  /_redevplugin/api/plugins/secrets/delete:
    post:
      operationId: deletePluginSecret
      parameters:
        - $ref: "#/components/parameters/OwnerSessionHashHeader"
      requestBody:
        $ref: "#/components/requestBodies/SecretRefRequest"
      responses:
        "200": { $ref: "#/components/responses/Envelope" }
  /_redevplugin/api/plugins/{plugin_instance_id}/settings/schema:
    get:
      operationId: getPluginSettingsSchema
      parameters:
        - $ref: "#/components/parameters/PluginInstanceID"
      responses:
        "200": { $ref: "#/components/responses/Envelope" }
  /_redevplugin/api/plugins/{plugin_instance_id}/settings:
    get:
      operationId: getPluginSettings
      parameters:
        - $ref: "#/components/parameters/PluginInstanceID"
      responses:
        "200": { $ref: "#/components/responses/Envelope" }
    patch:
      operationId: patchPluginSettings
      parameters:
        - $ref: "#/components/parameters/PluginInstanceID"
        - $ref: "#/components/parameters/OwnerSessionHashHeader"
      requestBody:
        $ref: "#/components/requestBodies/PatchSettingsRequest"
      responses:
        "200": { $ref: "#/components/responses/Envelope" }
  /_redevplugin/bootstrap:
    post:
      operationId: exchangePluginAssetTicket
      requestBody:
        $ref: "#/components/requestBodies/SandboxBootstrapRequest"
      responses:
        "200": { $ref: "#/components/responses/Envelope" }
  /_redevplugin/assets/{asset_session_id}/{asset_path...}:
    get:
      operationId: getPluginAsset
      parameters:
        - name: asset_session_id
          in: path
          required: true
          schema: { type: string }
          description: Non-secret asset session route id returned by the bootstrap exchange. The HttpOnly asset session cookie must validate to the same token id.
        - name: asset_path...
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Plugin package asset.
          headers:
            Content-Security-Policy:
              description: Sandbox asset CSP that blocks ambient browser egress and may include host-configured exact frame-ancestors.
              schema: { type: string }
            Reporting-Endpoints:
              description: CSP report endpoint for sandbox asset violations.
              schema: { type: string }
            Permissions-Policy:
              description: Denies browser capabilities such as camera, microphone, geolocation, clipboard, payment, and fullscreen by default.
              schema: { type: string }
            Referrer-Policy:
              description: Always no-referrer for plugin assets.
              schema: { type: string }
            Cross-Origin-Resource-Policy:
              description: Always same-origin for plugin assets.
              schema: { type: string }
            Service-Worker-Allowed:
              description: Does not expand the default service worker scope beyond the current asset directory.
              schema: { type: string }
  /_redevplugin/stream/{stream_id}:
    get:
      operationId: getPluginStream
      parameters:
        - name: stream_id
          in: path
          required: true
          schema: { type: string }
        - name: ticket
          in: query
          required: true
          schema: { type: string }
          description: Single-use stream ticket returned by the RPC call that created the stream.
      responses:
        "200":
          description: Plugin stream events drained as newline-delimited JSON.
          headers:
            Cache-Control:
              description: Always no-store because stream tickets are query credentials.
              schema: { type: string }
            Referrer-Policy:
              description: Always no-referrer for stream ticket reads.
              schema: { type: string }
            X-Content-Type-Options:
              description: Always nosniff for plugin stream responses.
              schema: { type: string }
            Cross-Origin-Resource-Policy:
              description: Always same-origin for plugin stream responses.
              schema: { type: string }
          content:
            application/x-ndjson:
              schema:
                type: string
                description: One JSON StreamEvent object per line.
  /_redevplugin/csp-report:
    post:
      operationId: reportPluginCSPViolation
      requestBody:
        $ref: "#/components/requestBodies/CSPReportRequest"
      responses:
        "200": { $ref: "#/components/responses/Envelope" }
components:
  parameters:
    OperationID:
      name: operation_id
      in: path
      required: true
      schema: { type: string }
    PluginInstanceID:
      name: plugin_instance_id
      in: path
      required: true
      schema: { type: string }
    SurfaceInstanceID:
      name: surface_instance_id
      in: path
      required: true
      schema: { type: string }
    OwnerSessionHashHeader:
      name: X-ReDevPlugin-Owner-Session-Hash
      in: header
      required: false
      schema: { type: string }
      description: Optional host session binding value passed to the configured WebSecurity guard for CSRF validation.
  responses:
    Envelope:
      description: Flat host envelope used by host product HTTP integration.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Envelope"
    ConfirmEnvelope:
      description: Confirmation intent response. The raw confirmation token stays server-side and is never returned to parent JavaScript or the plugin iframe.
      content:
        application/json:
          schema:
            allOf:
              - $ref: "#/components/schemas/Envelope"
              - type: object
                properties:
                  data:
                    $ref: "#/components/schemas/ConfirmResult"
    RetainedDataListEnvelope:
      description: Retained plugin data list response.
      content:
        application/json:
          schema:
            allOf:
              - $ref: "#/components/schemas/Envelope"
              - type: object
                properties:
                  data:
                    $ref: "#/components/schemas/RetainedDataList"
    RetainedDataRecordEnvelope:
      description: Retained plugin data record response. Error envelopes may include the failed record in data.
      content:
        application/json:
          schema:
            allOf:
              - $ref: "#/components/schemas/Envelope"
              - type: object
                properties:
                  data:
                    $ref: "#/components/schemas/RetainedDataRecord"
    RetainedDataCleanupEnvelope:
      description: Retained plugin data cleanup response. Partial cleanup failures return ok=false with the same data shape.
      content:
        application/json:
          schema:
            allOf:
              - $ref: "#/components/schemas/Envelope"
              - type: object
                properties:
                  data:
                    $ref: "#/components/schemas/RetainedDataCleanupResult"
  requestBodies:
    InstallRequest:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/InstallRequest"
    UpdateRequest:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/UpdateRequest"
    DowngradeRequest:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/DowngradeRequest"
    EnableRequest:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/EnableRequest"
    DisableRequest:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/DisableRequest"
    UninstallRequest:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/UninstallRequest"
    OpenSurfaceRequest:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/OpenSurfaceRequest"
    ExchangeAssetTicketRequest:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ExchangeAssetTicketRequest"
    BridgeTokenRequest:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/BridgeTokenRequest"
    RPCRequest:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/RPCRequest"
    InvokeIntentRequest:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/InvokeIntentRequest"
    CancelOperationRequest:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/CancelOperationRequest"
    StartRuntimeRequest:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/StartRuntimeRequest"
    ExportDataRequest:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ExportDataRequest"
    ImportDataRequest:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ImportDataRequest"
    DeleteRetainedDataRequest:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/DeleteRetainedDataRequest"
    BindRetainedDataRequest:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/BindRetainedDataRequest"
    CleanupExpiredRetainedDataRequest:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/CleanupExpiredRetainedDataRequest"
    GrantPermissionRequest:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/GrantPermissionRequest"
    RevokePermissionRequest:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/RevokePermissionRequest"
    SecretRefRequest:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/SecretRefRequest"
    PatchSettingsRequest:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/PatchSettingsRequest"
    SandboxBootstrapRequest:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/SandboxBootstrapRequest"
    CSPReportRequest:
      required: true
      content:
        application/csp-report:
          schema:
            $ref: "#/components/schemas/CSPReportPayload"
        application/json:
          schema:
            $ref: "#/components/schemas/CSPReportPayload"
  schemas:
    Envelope:
      type: object
      required: [ok]
      properties:
        ok: { type: boolean }
        data: true
        error: { type: string }
        error_code:
          $ref: "#/components/schemas/ErrorCode"
        error_details:
          $ref: "#/components/schemas/ErrorDetails"
    ErrorDetails:
      type: object
      additionalProperties: true
      properties:
        reason:
          type: string
          enum: [payload_bytes, json_depth, prototype_key, number_precision, manifest_missing, manifest_field, manifest_decode, zip_invalid, file_count, duplicate_entry, symlink_entry, directory_entry, entry_bytes, path_length, compression_ratio, total_uncompressed_bytes, entry_open_failed, entry_read_failed, entry_close_failed, entry_size_mismatch, unsupported_signature_entry, manifest_artifact, package_asset_security, package_artifact_boundary, entry_path, manifest_canonical_json, canonical_hash, package_signature, empty_path, slash_separator, non_canonical_path, path_traversal, hidden_path, external_icon_path, unsupported_icon_format, missing_icon_asset, icon_magic_mismatch, query_or_fragment]
        path:
          type: string
          description: Package-local entry path related to the error, when available.
        pointer:
          type: string
          description: JSON Pointer into manifest.json related to the error, when available.
    CSPReportPayload:
      type: object
      additionalProperties: true
      description: CSP violation report payload. The host accepts at most 32 KiB, maximum JSON depth 16, and applies per sandbox_origin plus active_fingerprint plus source IP rate limiting.
    ErrorCode:
      type: string
      enum:
        - PLUGIN_INVALID_REQUEST
        - PLUGIN_MANIFEST_INVALID
        - PLUGIN_PACKAGE_INVALID
        - PLUGIN_PACKAGE_TOO_LARGE
        - PLUGIN_PACKAGE_PATH_FORBIDDEN
        - PLUGIN_SIGNATURE_INVALID
        - PLUGIN_TRUST_STATE_DENIED
        - PLUGIN_TRUST_VERIFICATION_REQUIRED
        - PLUGIN_TRUST_VERIFICATION_INVALID
        - PLUGIN_DISABLED
        - PLUGIN_DISABLED_BY_POLICY
        - PLUGIN_PERMISSION_DENIED
        - PLUGIN_CONFIRMATION_REQUIRED
        - PLUGIN_CONFIRMATION_INVALID
        - PLUGIN_TOKEN_EXPIRED
        - PLUGIN_TOKEN_REPLAY
        - PLUGIN_GATEWAY_TOKEN_INVALID
        - PLUGIN_GATEWAY_TOKEN_REPLAYED
        - PLUGIN_GATEWAY_TOKEN_CHANNEL_MISMATCH
        - PLUGIN_ASSET_TICKET_INVALID
        - PLUGIN_ASSET_SESSION_INVALID
        - PLUGIN_STREAM_TICKET_INVALID
        - PLUGIN_STREAM_CANCELLED
        - PLUGIN_LEASE_INVALID
        - PLUGIN_LEASE_REPLAYED
        - PLUGIN_GRANT_INVALID
        - PLUGIN_STORAGE_QUOTA_EXCEEDED
        - PLUGIN_OPERATION_BLOCKED
        - PLUGIN_OPERATION_NOT_FOUND
        - PLUGIN_OPERATION_NOT_CANCELABLE
        - PLUGIN_NETWORK_TARGET_DENIED
        - PLUGIN_NETWORK_RATE_LIMITED
        - PLUGIN_RUNTIME_UNAVAILABLE
        - PLUGIN_RUNTIME_VERSION_MISMATCH
        - PLUGIN_JSON_LIMIT_EXCEEDED
        - PLUGIN_CONTRACT_MISMATCH
        - PLUGIN_CSRF_REQUIRED
        - PLUGIN_RETAINED_DATA_CLEANUP_FAILED
        - PLUGIN_RETAINED_DATA_BIND_FAILED
    TrustState:
      type: string
      enum: [bundled, verified, unsigned_local, untrusted, needs_review, blocked_security]
    InstallRequest:
      type: object
      required: [package_base64]
      additionalProperties: false
      properties:
        package_base64: { type: string, contentEncoding: base64, minLength: 1 }
        trust_state:
          $ref: "#/components/schemas/TrustState"
        plugin_instance_id: { type: string, minLength: 1 }
    UpdateRequest:
      type: object
      required: [plugin_instance_id, package_base64]
      additionalProperties: false
      properties:
        plugin_instance_id: { type: string, minLength: 1 }
        package_base64: { type: string, contentEncoding: base64, minLength: 1 }
        trust_state:
          $ref: "#/components/schemas/TrustState"
    DowngradeRequest:
      type: object
      required: [plugin_instance_id]
      additionalProperties: false
      properties:
        plugin_instance_id: { type: string, minLength: 1 }
        version: { type: string }
        package_hash: { type: string }
    EnableRequest:
      type: object
      required: [plugin_instance_id]
      additionalProperties: false
      properties:
        plugin_instance_id: { type: string, minLength: 1 }
    DisableRequest:
      type: object
      required: [plugin_instance_id]
      additionalProperties: false
      properties:
        plugin_instance_id: { type: string, minLength: 1 }
        reason: { type: string }
    UninstallRequest:
      type: object
      required: [plugin_instance_id, delete_data]
      additionalProperties: false
      properties:
        plugin_instance_id: { type: string, minLength: 1 }
        delete_data: { type: boolean }
    OpenSurfaceRequest:
      type: object
      required: [plugin_instance_id, surface_id]
      additionalProperties: false
      properties:
        plugin_instance_id: { type: string, minLength: 1 }
        surface_id: { type: string, minLength: 1 }
        surface_instance_id: { type: string }
        owner_session_hash: { type: string }
        owner_user_hash: { type: string }
        session_channel_id_hash: { type: string }
        sandbox_origin: { type: string }
    ExchangeAssetTicketRequest:
      type: object
      required: [asset_ticket]
      additionalProperties: false
      properties:
        asset_ticket: { type: string, minLength: 1 }
    BridgeHandshake:
      type: object
      required: [plugin_id, surface_id, surface_instance_id, active_fingerprint, bridge_nonce, ui_protocol_version]
      additionalProperties: false
      properties:
        type: { const: redevplugin.bridge.handshake }
        plugin_id: { type: string, minLength: 1 }
        surface_id: { type: string, minLength: 1 }
        surface_instance_id: { type: string, minLength: 1 }
        active_fingerprint: { type: string, minLength: 1 }
        bridge_nonce: { type: string, minLength: 1 }
        ui_protocol_version: { const: plugin-ui-v1 }
    BridgeTokenRequest:
      type: object
      required: [handshake, bridge_channel_id, handshake_transcript_sha256]
      additionalProperties: false
      properties:
        handshake:
          $ref: "#/components/schemas/BridgeHandshake"
        bridge_channel_id: { type: string, minLength: 1 }
        handshake_transcript_sha256:
          type: string
          pattern: '^sha256:[0-9a-f]{64}$'
    RPCRequest:
      type: object
      required: [plugin_instance_id, surface_instance_id, bridge_channel_id, plugin_gateway_token, method]
      additionalProperties: false
      properties:
        plugin_instance_id: { type: string, minLength: 1 }
        surface_instance_id: { type: string, minLength: 1 }
        session_channel_id_hash: { type: string }
        owner_session_hash: { type: string }
        owner_user_hash: { type: string }
        bridge_channel_id: { type: string, minLength: 1 }
        plugin_gateway_token: { type: string, minLength: 1 }
        confirmation_id: { type: string }
        method: { type: string, minLength: 1 }
        params:
          type: object
          additionalProperties: true
    RiskFlag:
      type: object
      required: [id, severity, summary]
      additionalProperties: false
      properties:
        id:
          type: string
          minLength: 1
          description: Stable machine-readable risk identifier.
        severity:
          type: string
          enum: [info, low, medium, high, critical]
        summary: { type: string, minLength: 1 }
        description: { type: string }
        requires_confirmation: { type: boolean }
        requires_admin: { type: boolean }
        data_loss_risk: { type: boolean }
        destructive: { type: boolean }
    RiskPlan:
      type: object
      required: [schema_version, summary, risk_flags]
      additionalProperties: false
      properties:
        schema_version: { const: redevplugin.capability.risk_plan.v1 }
        capability_id: { type: string }
        binding_id: { type: string }
        method: { type: string }
        target_method: { type: string }
        action: { type: string }
        effect:
          type: string
          enum: [read, write, execute, delete, admin]
        resource_ref: { type: string }
        resource_display_name: { type: string }
        summary: { type: string, minLength: 1 }
        risk_flags:
          type: array
          items:
            $ref: "#/components/schemas/RiskFlag"
        requires_confirmation: { type: boolean }
        requires_admin: { type: boolean }
        data_loss_risk: { type: boolean }
        destructive: { type: boolean }
        deny_reason: { type: string }
        details:
          type: object
          additionalProperties: true
    ConfirmResult:
      type: object
      required: [confirmation_id, confirmation_token_id, request_hash, plan_hash, expires_at]
      additionalProperties: false
      properties:
        confirmation_id: { type: string, minLength: 1 }
        confirmation_token_id:
          type: string
          minLength: 1
          description: Opaque audit/display id for the server-held confirmation token. It is not a credential.
        request_hash:
          type: string
          pattern: "^sha256:[0-9a-f]{64}$"
        plan_hash:
          type: string
          pattern: "^sha256:[0-9a-f]{64}$"
        plan:
          description: Host-redacted confirmation plan payload returned by the declared preflight method, when available.
          oneOf:
            - $ref: "#/components/schemas/RiskPlan"
            - type: object
              additionalProperties: true
        expires_at: { type: string, format: date-time }
    InvokeIntentRequest:
      type: object
      required: [intent_id]
      additionalProperties: false
      properties:
        plugin_instance_id: { type: string }
        intent_id: { type: string, minLength: 1 }
        params:
          type: object
          additionalProperties: true
        owner_session_hash: { type: string }
        owner_user_hash: { type: string }
        session_channel_id_hash: { type: string }
    CancelOperationRequest:
      type: object
      additionalProperties: false
      properties:
        reason: { type: string }
    StartRuntimeRequest:
      type: object
      additionalProperties: false
      properties:
        target:
          type: object
          additionalProperties: false
          properties:
            os: { type: string }
            arch: { type: string }
    ExportDataRequest:
      type: object
      required: [plugin_instance_id]
      additionalProperties: false
      properties:
        plugin_instance_id: { type: string, minLength: 1 }
        include_secrets: { type: boolean }
    ImportDataRequest:
      type: object
      required: [plugin_instance_id]
      additionalProperties: false
      description: At least one of archive_ref or settings_archive_ref must be supplied. Storage archive refs and settings archive refs are separated so settings secrets can remain redacted and require rebinding after import.
      properties:
        plugin_instance_id: { type: string, minLength: 1 }
        archive_ref: { type: string, minLength: 1 }
        settings_archive_ref: { type: string, minLength: 1 }
        delete_existing: { type: boolean }
    RetainedDataState:
      type: string
      enum: [retained, expired, bound, deleted, delete_failed_retryable]
    RetainedDataRecord:
      type: object
      required:
        - retained_id
        - source_plugin_instance_id
        - publisher_id
        - plugin_id
        - version
        - package_hash
        - manifest_hash
        - state
        - storage_retained
        - settings_retained
        - browser_site_retained
        - retained_at
        - updated_at
      additionalProperties: false
      properties:
        retained_id: { type: string, minLength: 1 }
        source_plugin_instance_id: { type: string, minLength: 1 }
        bound_plugin_instance_id: { type: string }
        publisher_id: { type: string, minLength: 1 }
        plugin_id: { type: string, minLength: 1 }
        version: { type: string, minLength: 1 }
        package_hash: { type: string, minLength: 1 }
        manifest_hash: { type: string, minLength: 1 }
        state:
          $ref: "#/components/schemas/RetainedDataState"
        storage_retained: { type: boolean }
        settings_retained: { type: boolean }
        browser_site_retained: { type: boolean }
        usage_bytes:
          type: integer
          minimum: 0
        delete_after: { type: string, format: date-time }
        delete_error: { type: string }
        metadata:
          type: object
          additionalProperties: { type: string }
        retained_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        bound_at: { type: string, format: date-time }
        deleted_at: { type: string, format: date-time }
        last_accessed_at: { type: string, format: date-time }
    RetainedDataList:
      type: object
      required: [retained_data]
      additionalProperties: false
      properties:
        retained_data:
          type: array
          items:
            $ref: "#/components/schemas/RetainedDataRecord"
    RetainedDataCleanupResult:
      type: object
      additionalProperties: false
      properties:
        deleted:
          type: array
          items:
            $ref: "#/components/schemas/RetainedDataRecord"
        failed:
          type: array
          items:
            $ref: "#/components/schemas/RetainedDataRecord"
    DeleteRetainedDataRequest:
      type: object
      required: [retained_id]
      additionalProperties: false
      properties:
        retained_id: { type: string, minLength: 1 }
    BindRetainedDataRequest:
      type: object
      required: [retained_id, target_plugin_instance_id]
      additionalProperties: false
      properties:
        retained_id: { type: string, minLength: 1 }
        target_plugin_instance_id: { type: string, minLength: 1 }
    CleanupExpiredRetainedDataRequest:
      type: object
      additionalProperties: false
      properties:
        retry_failed: { type: boolean }
        max_records:
          type: integer
          minimum: 1
    GrantPermissionRequest:
      type: object
      required: [plugin_instance_id, permission_id]
      additionalProperties: false
      properties:
        plugin_instance_id: { type: string, minLength: 1 }
        permission_id: { type: string, minLength: 1 }
        granted_by: { type: string }
        expires_at: { type: string, format: date-time }
    RevokePermissionRequest:
      type: object
      required: [plugin_instance_id, permission_id]
      additionalProperties: false
      properties:
        plugin_instance_id: { type: string, minLength: 1 }
        permission_id: { type: string, minLength: 1 }
        revoked_by: { type: string }
        reason: { type: string }
    SecretRefRequest:
      type: object
      required: [plugin_instance_id, secret_ref, scope]
      additionalProperties: false
      properties:
        plugin_instance_id: { type: string, minLength: 1 }
        secret_ref: { type: string, minLength: 1 }
        scope: { type: string, enum: [user, environment] }
    PatchSettingsRequest:
      type: object
      required: [values]
      additionalProperties: false
      properties:
        values:
          type: object
          additionalProperties: true
    SandboxBootstrapRequest:
      type: object
      required: [surface_instance_id, asset_ticket]
      additionalProperties: false
      properties:
        surface_instance_id: { type: string, minLength: 1 }
        asset_ticket: { type: string, minLength: 1 }
