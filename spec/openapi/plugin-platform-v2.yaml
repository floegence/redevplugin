        params:
          type: object
          additionalProperties: true
    CancelOperationRequest:
      type: object
      additionalProperties: false
      properties:
        reason: { type: string }
    CapabilityContractPin:
      $ref: "../plugin/host-capability-pin-v1.schema.json"
    ExecutionBinding:
      type: object
      description: Immutable execution fields embedded into operation and stream records.
      required:
        - invocation_id
        - audit_correlation_id
        - publisher_id
        - plugin_id
        - plugin_instance_id
        - plugin_version
        - active_fingerprint
        - route_kind
        - capability_id
        - capability_version
        - binding_id
        - method
        - target_method
        - effect
        - execution
        - permissions
        - confirmation
        - revision
        - quota
        - target
        - target_descriptor_sha256
      properties:
        invocation_id: { type: string, minLength: 1 }
        audit_correlation_id: { type: string, minLength: 1 }
        operation_id: { type: string, minLength: 1 }
        stream_id: { type: string, minLength: 1 }
        publisher_id: { type: string, minLength: 1 }
        plugin_id: { type: string, minLength: 1 }
        plugin_instance_id: { type: string, minLength: 1 }
        plugin_version: { type: string, minLength: 1 }
        active_fingerprint: { type: string, minLength: 1 }
        surface_instance_id: { type: string }
        owner_session_hash: { type: string }
        owner_user_hash: { type: string }
        session_channel_id_hash: { type: string }
        bridge_channel_id: { type: string }
        route_kind: { type: string, enum: [capability, worker, core_action] }
        capability_id: { type: string, minLength: 1 }
        capability_version: { type: string, minLength: 1 }
        binding_id: { type: string, minLength: 1 }
        contract:
          $ref: "#/components/schemas/CapabilityContractPin"
        method: { type: string, minLength: 1 }
        target_method: { type: string, minLength: 1 }
        effect: { type: string, enum: [read, write, execute, delete, admin] }
        execution: { type: string, enum: [sync, operation, subscription] }
        permissions:
          type: object
          additionalProperties: false
          required: [required, granted]
          properties:
            required: { type: array, items: { type: string } }
            granted: { type: array, items: { type: string } }
        confirmation:
          type: object
          additionalProperties: false
          required: [required, confirmed]
          properties:
            required: { type: boolean }
            confirmed: { type: boolean }
            confirmation_id: { type: string }
            request_sha256: { type: string }
            plan_sha256: { type: string }
            target_sha256: { type: string }
        revision:
          type: object
          additionalProperties: false
          required: [policy_revision, management_revision, revoke_epoch]
          properties:
            policy_revision: { type: integer, minimum: 0 }
            management_revision: { type: integer, minimum: 0 }
            revoke_epoch: { type: integer, minimum: 0 }
        quota:
          type: object
          additionalProperties: false
          properties:
            max_concurrent: { type: integer, minimum: 0 }
            max_duration_ms: { type: integer, minimum: 0 }
            max_stream_bytes: { type: integer, minimum: 0 }
            expires_at: { type: string, format: date-time }
        target:
          type: object
          additionalProperties: false
          required: [kind, fields]
          properties:
            kind: { type: string, minLength: 1 }
            fields: { type: object, additionalProperties: true }
        target_descriptor_sha256: { type: string, pattern: '^sha256:[0-9a-f]{64}$' }
        stream_event_type_name: { type: string, minLength: 1 }
        stream_event_schema_sha256: { type: string, pattern: '^[0-9a-f]{64}$' }
      allOf:
        - if:
            properties:
              route_kind: { const: capability }
          then:
            required: [contract]
          else:
            not:
              required: [contract]
    OperationRecord:
      allOf:
        - $ref: "#/components/schemas/ExecutionBinding"
        - type: object
          required: [operation_id, status, cancelable, created_at, updated_at]
          properties:
            operation_id: { type: string, minLength: 1 }
            execution: { type: string, enum: [operation, subscription] }
            status:
              type: string
              enum: [running, cancel_requested, canceled, completed, failed, orphaned_after_disable, orphaned_after_uninstall]
            cancelable: { type: boolean }
            cancel_ack_timeout_ms: { type: integer, minimum: 0 }
            disable_behavior: { type: string, enum: [cancel, orphan, wait] }
            uninstall_behavior: { type: string, enum: [cancel_then_block_delete, force_cleanup_allowed] }
            reason: { type: string }
            created_at: { type: string, format: date-time }
            updated_at: { type: string, format: date-time }
            cancel_requested_at: { type: string, format: date-time }
            orphaned_at: { type: string, format: date-time }
    StartRuntimeRequest:
      type: object
      additionalProperties: false
      properties:
        target:
          type: object
          additionalProperties: false
          properties:
            os: { type: string }
            arch: { type: string }
    ExportDataRequest:
      type: object
      required: [plugin_instance_id]
      additionalProperties: false
      properties:
        plugin_instance_id: { type: string, minLength: 1 }
        include_secrets: { type: boolean }
    ImportDataRequest:
      type: object
      required: [plugin_instance_id]
      additionalProperties: false
      description: At least one of archive_ref or settings_archive_ref must be supplied. Storage archive refs and settings archive refs are separated so settings secrets can remain redacted and require rebinding after import.
      properties:
        plugin_instance_id: { type: string, minLength: 1 }
        archive_ref: { type: string, minLength: 1 }
        settings_archive_ref: { type: string, minLength: 1 }
        delete_existing: { type: boolean }
    RetainedDataState:
      type: string
      enum: [retained, expired, bound, deleted, delete_failed_retryable]
    RetainedDataRecord:
      type: object
      required:
        - retained_id
        - source_plugin_instance_id
        - publisher_id
        - plugin_id
        - version
        - package_hash
        - manifest_hash
        - state
        - storage_retained
        - settings_retained
        - retained_at
        - updated_at
      additionalProperties: false
      properties:
        retained_id: { type: string, minLength: 1 }
        source_plugin_instance_id: { type: string, minLength: 1 }
        bound_plugin_instance_id: { type: string }
        publisher_id: { type: string, minLength: 1 }
        plugin_id: { type: string, minLength: 1 }
        version: { type: string, minLength: 1 }
        package_hash: { type: string, minLength: 1 }
        manifest_hash: { type: string, minLength: 1 }
        state:
          $ref: "#/components/schemas/RetainedDataState"
        storage_retained: { type: boolean }
        settings_retained: { type: boolean }
        usage_bytes:
          type: integer
          minimum: 0
        delete_after: { type: string, format: date-time }
        delete_error: { type: string }
        metadata:
          type: object
          additionalProperties: { type: string }
        retained_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        bound_at: { type: string, format: date-time }
        deleted_at: { type: string, format: date-time }
        last_accessed_at: { type: string, format: date-time }
    RetainedDataList:
      type: object
      required: [retained_data]
      additionalProperties: false
      properties:
        retained_data:
          type: array
          items:
            $ref: "#/components/schemas/RetainedDataRecord"
    RetainedDataCleanupResult:
      type: object
      additionalProperties: false
      properties:
        deleted:
          type: array
          items:
            $ref: "#/components/schemas/RetainedDataRecord"
        failed:
          type: array
          items:
            $ref: "#/components/schemas/RetainedDataRecord"
    DeleteRetainedDataRequest:
      type: object
      required: [retained_id]
      additionalProperties: false
      properties:
        retained_id: { type: string, minLength: 1 }
    BindRetainedDataRequest:
      type: object
      required: [retained_id, target_plugin_instance_id]
      additionalProperties: false
      properties:
        retained_id: { type: string, minLength: 1 }
        target_plugin_instance_id: { type: string, minLength: 1 }
    CleanupExpiredRetainedDataRequest:
      type: object
      additionalProperties: false
      properties:
        retry_failed: { type: boolean }
        max_records:
          type: integer
          minimum: 1
    GrantPermissionRequest:
      type: object
      required: [plugin_instance_id, permission_id]
      additionalProperties: false
      properties:
        plugin_instance_id: { type: string, minLength: 1 }
        permission_id: { type: string, minLength: 1 }
        granted_by: { type: string }
        expires_at: { type: string, format: date-time }
    RevokePermissionRequest:
      type: object
      required: [plugin_instance_id, permission_id]
      additionalProperties: false
      properties:
        plugin_instance_id: { type: string, minLength: 1 }
        permission_id: { type: string, minLength: 1 }
        revoked_by: { type: string }
        reason: { type: string }
    SecretRefRequest:
      type: object
      required: [plugin_instance_id, secret_ref, scope]
      additionalProperties: false
      properties:
        plugin_instance_id: { type: string, minLength: 1 }
        secret_ref: { type: string, minLength: 1 }
        scope: { type: string, enum: [user, environment] }
    PatchSettingsRequest:
      type: object
      required: [values]
      additionalProperties: false
      properties:
        values:
          type: object
          additionalProperties: true
