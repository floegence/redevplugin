openapi: 3.1.0
info:
  title: ReDevPlugin Plugin Platform API
  version: plugin-platform-v2
  description: Host-agnostic plugin management, bridge, operation, data, and sandbox routes. Release-ref install and update routes resolve host-controlled package artifacts server-side and do not accept requested trust_state values; local-import package install/update routes are explicit developer/import flows and also do not accept caller-supplied trust_state values.
paths:
  /_redevplugin/api/plugins/local-import/install:
    post:
      x-redevplugin-route-set: local_import
      operationId: importLocalPackage
      requestBody:
        $ref: "#/components/requestBodies/ImportLocalPackageRequest"
      responses:
        "200": { $ref: "#/components/responses/PluginRecordEnvelope" }
  /_redevplugin/api/plugins/install-release-ref:
    post:
      operationId: installReleaseRef
      requestBody:
        $ref: "#/components/requestBodies/InstallReleaseRefRequest"
      responses:
        "200": { $ref: "#/components/responses/PluginRecordEnvelope" }
  /_redevplugin/api/plugins/enable:
    post:
      operationId: enablePlugin
      requestBody:
        $ref: "#/components/requestBodies/EnableRequest"
      responses:
        "200": { $ref: "#/components/responses/PluginRecordEnvelope" }
  /_redevplugin/api/plugins/disable:
    post:
      operationId: disablePlugin
      requestBody:
        $ref: "#/components/requestBodies/DisableRequest"
      responses:
        "200": { $ref: "#/components/responses/PluginRecordEnvelope" }
  /_redevplugin/api/plugins/uninstall:
    post:
      operationId: uninstallPlugin
      requestBody:
        $ref: "#/components/requestBodies/UninstallRequest"
      responses:
        "200": { $ref: "#/components/responses/PluginRecordEnvelope" }
  /_redevplugin/api/plugins/local-import/update:
    post:
      x-redevplugin-route-set: local_import
      operationId: updateLocalPackage
      requestBody:
        $ref: "#/components/requestBodies/UpdateLocalPackageRequest"
      responses:
        "200": { $ref: "#/components/responses/PluginRecordEnvelope" }
  /_redevplugin/api/plugins/update-release-ref:
    post:
      operationId: updateReleaseRef
      requestBody:
        $ref: "#/components/requestBodies/UpdateReleaseRefRequest"
      responses:
        "200": { $ref: "#/components/responses/PluginRecordEnvelope" }
  /_redevplugin/api/plugins/downgrade:
    post:
      operationId: downgradePlugin
      requestBody:
        $ref: "#/components/requestBodies/DowngradeRequest"
      responses:
        "200": { $ref: "#/components/responses/PluginRecordEnvelope" }
  /_redevplugin/api/plugins/catalog:
    get:
      operationId: listPlugins
      responses:
        "200": { $ref: "#/components/responses/PluginCatalogEnvelope" }
  /_redevplugin/api/plugins/platform/compatibility:
    get:
      operationId: getPluginPlatformCompatibility
      description: Returns the host-consumable ReDevPlugin compatibility manifest for the mounted platform artifact set.
      responses:
        "200": { $ref: "#/components/responses/Envelope" }
  /_redevplugin/api/plugins/surfaces/open:
    post:
      operationId: openPluginSurface
      requestBody:
        $ref: "#/components/requestBodies/OpenSurfaceRequest"
      responses:
        "200": { $ref: "#/components/responses/SurfaceBootstrapEnvelope" }
  /_redevplugin/api/plugins/surfaces/revoke-scope:
    post:
      operationId: revokePluginSurfaceScope
      description: Revokes every active plugin surface and token bound to the authenticated owner session or session channel derived by the host.
      requestBody:
        $ref: "#/components/requestBodies/RevokeSurfaceScopeRequest"
      responses:
        "200": { $ref: "#/components/responses/SurfaceScopeRevokeEnvelope" }
  /_redevplugin/api/plugins/surfaces/{surface_instance_id}/prepare:
    post:
      operationId: preparePluginSurface
      parameters:
        - $ref: "#/components/parameters/SurfaceInstanceID"
      requestBody:
        $ref: "#/components/requestBodies/PrepareSurfaceRequest"
      responses:
        "200": { $ref: "#/components/responses/SurfacePreparationEnvelope" }
  /_redevplugin/api/plugins/surfaces/{surface_instance_id}/bridge-token:
    post:
      operationId: createSurfaceBridgeToken
      parameters:
        - $ref: "#/components/parameters/SurfaceInstanceID"
      requestBody:
        $ref: "#/components/requestBodies/TrustedParentBridgeTokenRequest"
      responses:
        "200": { $ref: "#/components/responses/BridgeTokenEnvelope" }
  /_redevplugin/api/plugins/surfaces/{surface_instance_id}/assets/read:
    post:
      operationId: readPreparedSurfaceAsset
      parameters:
        - $ref: "#/components/parameters/SurfaceInstanceID"
      requestBody:
        $ref: "#/components/requestBodies/ReadSurfaceAssetRequest"
      responses:
        "200": { $ref: "#/components/responses/SurfaceAssetEnvelope" }
  /_redevplugin/api/plugins/surfaces/{surface_instance_id}/streams/read:
    post:
      operationId: readPreparedSurfaceStream
      parameters:
        - $ref: "#/components/parameters/SurfaceInstanceID"
      requestBody:
        $ref: "#/components/requestBodies/ReadSurfaceStreamRequest"
      responses:
        "200": { $ref: "#/components/responses/SurfaceStreamEnvelope" }
  /_redevplugin/api/plugins/surfaces/{surface_instance_id}/operations/cancel:
    post:
      operationId: cancelSurfacePluginOperation
      description: Cancels an operation only when it belongs to the authenticated surface, session, and private bridge channel.
      parameters:
        - $ref: "#/components/parameters/SurfaceInstanceID"
      requestBody:
        $ref: "#/components/requestBodies/CancelSurfaceOperationRequest"
      responses:
        "200": { $ref: "#/components/responses/OperationRecordEnvelope" }
  /_redevplugin/api/plugins/surfaces/{surface_instance_id}/confirmations/reject:
    post:
      operationId: rejectSurfacePluginConfirmation
      description: Atomically rejects a pending confirmation only when it belongs to the authenticated surface, session, current plugin revision, and private bridge channel.
      parameters:
        - $ref: "#/components/parameters/SurfaceInstanceID"
      requestBody:
        $ref: "#/components/requestBodies/RejectSurfaceConfirmationRequest"
      responses:
        "200": { $ref: "#/components/responses/ConfirmationRejectionEnvelope" }
  /_redevplugin/api/plugins/surfaces/{surface_instance_id}/dispose:
    post:
      operationId: disposePluginSurface
      parameters:
        - $ref: "#/components/parameters/SurfaceInstanceID"
      requestBody:
        $ref: "#/components/requestBodies/DisposeSurfaceRequest"
      responses:
        "200": { $ref: "#/components/responses/SurfaceDisposeEnvelope" }
  /_redevplugin/api/plugins/rpc:
    post:
      operationId: callPluginMethod
      requestBody:
        $ref: "#/components/requestBodies/RPCRequest"
      responses:
        "200": { $ref: "#/components/responses/RPCEnvelope" }
  /_redevplugin/api/plugins/confirm:
    post:
      operationId: confirmPluginIntent
      requestBody:
        $ref: "#/components/requestBodies/RPCRequest"
      responses:
        "200": { $ref: "#/components/responses/ConfirmEnvelope" }
  /_redevplugin/api/plugins/intents:
    get:
      operationId: listPluginIntents
      description: 'Lists enabled, runnable plugin intents available to host-mediated interop. The response data is `{ "intents": [...] }`.'
      responses:
        "200": { $ref: "#/components/responses/Envelope" }
  /_redevplugin/api/plugins/intents/invoke:
    post:
      operationId: invokePluginIntent
      description: Invokes a host-mediated plugin intent without iframe gateway tokens while preserving local policy, permission grants, and dangerous-method fail-closed checks.
      requestBody:
        $ref: "#/components/requestBodies/InvokeIntentRequest"
      responses:
        "200": { $ref: "#/components/responses/Envelope" }
  /_redevplugin/api/plugins/operations:
    get:
      operationId: listPluginOperations
      responses:
        "200": { $ref: "#/components/responses/OperationListEnvelope" }
  /_redevplugin/api/plugins/operations/{operation_id}:
    get:
      operationId: getPluginOperation
      parameters:
        - $ref: "#/components/parameters/OperationID"
      responses:
        "200": { $ref: "#/components/responses/OperationRecordEnvelope" }
  /_redevplugin/api/plugins/operations/{operation_id}/cancel:
    post:
      operationId: cancelPluginOperation
      parameters:
        - $ref: "#/components/parameters/OperationID"
      requestBody:
        $ref: "#/components/requestBodies/CancelOperationRequest"
      responses:
        "200": { $ref: "#/components/responses/OperationRecordEnvelope" }
  /_redevplugin/api/plugins/runtime/start:
    post:
      operationId: startPluginRuntime
      requestBody:
        $ref: "#/components/requestBodies/StartRuntimeRequest"
      responses:
        "200": { $ref: "#/components/responses/Envelope" }
  /_redevplugin/api/plugins/runtime/stop:
    post:
      operationId: stopPluginRuntime
      responses:
        "200": { $ref: "#/components/responses/Envelope" }
  /_redevplugin/api/plugins/runtime/refresh-enabled:
    post:
      operationId: refreshEnabledPluginRuntimeState
      description: 'Replays runtime-derived state for enabled plugins after the embedding host process restarts or reattaches adapters. The response data is `{ "refreshed_plugins": [...] }`.'
      responses:
        "200": { $ref: "#/components/responses/Envelope" }
  /_redevplugin/api/plugins/runtime/health:
    get:
      operationId: getPluginRuntimeHealth
      responses:
        "200": { $ref: "#/components/responses/Envelope" }
  /_redevplugin/api/plugins/data/export:
    post:
      operationId: exportPluginData
      requestBody:
        $ref: "#/components/requestBodies/ExportDataRequest"
      responses:
        "200": { $ref: "#/components/responses/Envelope" }
  /_redevplugin/api/plugins/data/import:
    post:
      operationId: importPluginData
      requestBody:
        $ref: "#/components/requestBodies/ImportDataRequest"
      responses:
        "200": { $ref: "#/components/responses/Envelope" }
  /_redevplugin/api/plugins/retained-data:
    get:
      operationId: listPluginRetainedData
      parameters:
        - name: publisher_id
          in: query
          schema: { type: string }
        - name: plugin_id
          in: query
          schema: { type: string }
        - name: source_plugin_instance_id
          in: query
          schema: { type: string }
        - name: state
          in: query
          schema:
            $ref: "#/components/schemas/RetainedDataState"
      responses:
        "200": { $ref: "#/components/responses/RetainedDataListEnvelope" }
  /_redevplugin/api/plugins/retained-data/delete:
    post:
      operationId: deletePluginRetainedData
      requestBody:
        $ref: "#/components/requestBodies/DeleteRetainedDataRequest"
      responses:
        "200": { $ref: "#/components/responses/RetainedDataRecordEnvelope" }
        "409": { $ref: "#/components/responses/RetainedDataRecordEnvelope" }
  /_redevplugin/api/plugins/retained-data/bind:
    post:
      operationId: bindPluginRetainedData
      requestBody:
        $ref: "#/components/requestBodies/BindRetainedDataRequest"
      responses:
        "200": { $ref: "#/components/responses/RetainedDataRecordEnvelope" }
        "409": { $ref: "#/components/responses/RetainedDataRecordEnvelope" }
  /_redevplugin/api/plugins/retained-data/cleanup-expired:
    post:
      operationId: cleanupExpiredPluginRetainedData
      requestBody:
        $ref: "#/components/requestBodies/CleanupExpiredRetainedDataRequest"
      responses:
        "200": { $ref: "#/components/responses/RetainedDataCleanupEnvelope" }
        "409": { $ref: "#/components/responses/RetainedDataCleanupEnvelope" }
  /_redevplugin/api/plugins/permissions:
    get:
      operationId: listPluginPermissionGrants
      responses:
        "200": { $ref: "#/components/responses/Envelope" }
  /_redevplugin/api/plugins/permissions/grant:
    post:
      operationId: grantPluginPermission
      requestBody:
        $ref: "#/components/requestBodies/GrantPermissionRequest"
      responses:
        "200": { $ref: "#/components/responses/Envelope" }
  /_redevplugin/api/plugins/permissions/revoke:
    post:
      operationId: revokePluginPermission
      requestBody:
        $ref: "#/components/requestBodies/RevokePermissionRequest"
      responses:
        "200": { $ref: "#/components/responses/Envelope" }
  /_redevplugin/api/plugins/audit:
    get:
      operationId: listPluginAuditEvents
      responses:
        "200": { $ref: "#/components/responses/Envelope" }
  /_redevplugin/api/plugins/diagnostics:
    get:
      operationId: listPluginDiagnosticEvents
      responses:
        "200": { $ref: "#/components/responses/Envelope" }
  /_redevplugin/api/plugins/secrets/bind:
    post:
      operationId: bindPluginSecret
      requestBody:
        $ref: "#/components/requestBodies/SecretRefRequest"
      responses:
        "200": { $ref: "#/components/responses/Envelope" }
  /_redevplugin/api/plugins/secrets/test:
    post:
      operationId: testPluginSecret
      requestBody:
        $ref: "#/components/requestBodies/SecretRefRequest"
      responses:
        "200": { $ref: "#/components/responses/Envelope" }
  /_redevplugin/api/plugins/secrets/delete:
    post:
      operationId: deletePluginSecret
      requestBody:
        $ref: "#/components/requestBodies/SecretRefRequest"
      responses:
        "200": { $ref: "#/components/responses/Envelope" }
  /_redevplugin/api/plugins/{plugin_instance_id}/settings/schema:
    get:
      operationId: getPluginSettingsSchema
      parameters:
        - $ref: "#/components/parameters/PluginInstanceID"
      responses:
        "200": { $ref: "#/components/responses/Envelope" }
  /_redevplugin/api/plugins/{plugin_instance_id}/settings:
    get:
      operationId: getPluginSettings
      parameters:
        - $ref: "#/components/parameters/PluginInstanceID"
      responses:
        "200": { $ref: "#/components/responses/Envelope" }
    patch:
      operationId: patchPluginSettings
      parameters:
        - $ref: "#/components/parameters/PluginInstanceID"
      requestBody:
        $ref: "#/components/requestBodies/PatchSettingsRequest"
      responses:
        "200": { $ref: "#/components/responses/Envelope" }
components:
  parameters:
    OperationID:
      name: operation_id
      in: path
      required: true
      schema: { type: string }
    PluginInstanceID:
      name: plugin_instance_id
      in: path
      required: true
      schema: { type: string }
    SurfaceInstanceID:
      name: surface_instance_id
      in: path
      required: true
      schema: { type: string }
  responses:
    Envelope:
      description: Flat host envelope used by host product HTTP integration.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Envelope"
    RPCEnvelope:
      description: Typed plugin method result. Subscriptions always bind one operation and one stream.
      content:
        application/json:
          schema:
            allOf:
              - $ref: "#/components/schemas/Envelope"
              - type: object
                properties:
                  data:
                    $ref: "#/components/schemas/RPCResult"
    SurfaceBootstrapEnvelope:
      description: Trusted-parent surface bootstrap. Capability-bearing fields are never forwarded into the opaque iframe or plugin worker.
      content:
        application/json:
          schema:
            allOf:
              - $ref: "#/components/schemas/Envelope"
              - type: object
                properties:
                  data:
                    $ref: "#/components/schemas/SurfaceBootstrap"
    SurfacePreparationEnvelope:
      description: Trusted-parent asset-session exchange and validated opaque surface document.
      content:
        application/json:
          schema:
            allOf:
              - $ref: "#/components/schemas/Envelope"
              - type: object
                properties:
                  data:
                    $ref: "#/components/schemas/SurfacePreparation"
    BridgeTokenEnvelope:
      description: Trusted-parent plugin gateway token response.
      content:
        application/json:
          schema:
            allOf:
              - $ref: "#/components/schemas/Envelope"
              - type: object
                properties:
                  data:
                    $ref: "#/components/schemas/BridgeTokenResult"
    SurfaceAssetEnvelope:
      description: Trusted-parent package asset response. The plugin receives only a renderer-created blob URL.
      content:
        application/json:
          schema:
            allOf:
              - $ref: "#/components/schemas/Envelope"
              - type: object
                properties:
                  data:
                    $ref: "#/components/schemas/SurfaceAssetResult"
    SurfaceStreamEnvelope:
      description: Trusted-parent stream redemption response. Stream tickets remain outside the plugin worker.
      content:
        application/json:
          schema:
            allOf:
              - $ref: "#/components/schemas/Envelope"
              - type: object
                properties:
                  data:
                    $ref: "#/components/schemas/SurfaceStreamResult"
    SurfaceDisposeEnvelope:
      description: Surface revocation response.
      content:
        application/json:
          schema:
            allOf:
              - $ref: "#/components/schemas/Envelope"
              - type: object
                properties:
                  data:
                    type: object
                    additionalProperties: false
                    required: [disposed]
                    properties:
                      disposed: { const: true }
    SurfaceScopeRevokeEnvelope:
      description: Authenticated owner-session surface revocation response.
      content:
        application/json:
          schema:
            allOf:
              - $ref: "#/components/schemas/Envelope"
              - type: object
                properties:
                  data:
                    type: object
                    additionalProperties: false
                    required: [revoked_surface_count]
                    properties:
                      revoked_surface_count: { type: integer, minimum: 0 }
    PluginRecordEnvelope:
      description: Plugin lifecycle response with typed registry trust assessment.
      content:
        application/json:
          schema:
            allOf:
              - $ref: "#/components/schemas/Envelope"
              - type: object
                properties:
                  data:
                    $ref: "#/components/schemas/PluginRecord"
    PluginCatalogEnvelope:
      description: Installed plugin catalog response with typed registry records.
      content:
        application/json:
          schema:
            allOf:
              - $ref: "#/components/schemas/Envelope"
              - type: object
                properties:
                  data:
                    type: object
                    required: [plugins]
                    additionalProperties: false
                    properties:
                      plugins:
                        type: array
                        items:
                          $ref: "#/components/schemas/PluginRecord"
    ConfirmEnvelope:
      description: Confirmation intent response. The raw confirmation token stays server-side and is never returned to parent JavaScript or the plugin iframe.
      content:
        application/json:
          schema:
            allOf:
              - $ref: "#/components/schemas/Envelope"
              - type: object
                properties:
                  data:
                    $ref: "#/components/schemas/ConfirmResult"
    ConfirmationRejectionEnvelope:
      description: Trusted-parent acknowledgement that the pending confirmation was atomically rejected and cannot be replayed.
      content:
        application/json:
          schema:
            allOf:
              - $ref: "#/components/schemas/Envelope"
              - type: object
                properties:
                  data:
                    $ref: "#/components/schemas/ConfirmationRejectionResult"
    RetainedDataListEnvelope:
      description: Retained plugin data list response.
      content:
        application/json:
          schema:
            allOf:
              - $ref: "#/components/schemas/Envelope"
              - type: object
                properties:
                  data:
                    $ref: "#/components/schemas/RetainedDataList"
    RetainedDataRecordEnvelope:
      description: Retained plugin data record response. Error envelopes may include the failed record in data.
      content:
        application/json:
          schema:
            allOf:
              - $ref: "#/components/schemas/Envelope"
              - type: object
                properties:
                  data:
                    $ref: "#/components/schemas/RetainedDataRecord"
    RetainedDataCleanupEnvelope:
      description: Retained plugin data cleanup response. Partial cleanup failures return ok=false with the same data shape.
      content:
        application/json:
          schema:
            allOf:
              - $ref: "#/components/schemas/Envelope"
              - type: object
                properties:
                  data:
                    $ref: "#/components/schemas/RetainedDataCleanupResult"
    OperationRecordEnvelope:
      description: Host-owned operation record with its immutable execution binding.
      content:
        application/json:
          schema:
            allOf:
              - $ref: "#/components/schemas/Envelope"
              - type: object
                properties:
                  data:
                    $ref: "#/components/schemas/OperationRecord"
    OperationListEnvelope:
      description: Host-owned operation records with immutable execution bindings.
      content:
        application/json:
          schema:
            allOf:
              - $ref: "#/components/schemas/Envelope"
              - type: object
                properties:
                  data:
                    type: object
                    additionalProperties: false
                    required: [operations]
                    properties:
                      operations:
                        type: array
                        items:
                          $ref: "#/components/schemas/OperationRecord"
  requestBodies:
    ImportLocalPackageRequest:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ImportLocalPackageRequest"
    InstallReleaseRefRequest:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/InstallReleaseRefRequest"
    UpdateLocalPackageRequest:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/UpdateLocalPackageRequest"
    UpdateReleaseRefRequest:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/UpdateReleaseRefRequest"
    DowngradeRequest:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/DowngradeRequest"
    EnableRequest:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/EnableRequest"
    DisableRequest:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/DisableRequest"
    UninstallRequest:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/UninstallRequest"
    OpenSurfaceRequest:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/OpenSurfaceRequest"
    RevokeSurfaceScopeRequest:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/RevokeSurfaceScopeRequest"
    PrepareSurfaceRequest:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/PrepareSurfaceRequest"
    TrustedParentBridgeTokenRequest:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/TrustedParentBridgeTokenRequest"
    ReadSurfaceAssetRequest:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ReadSurfaceAssetRequest"
    ReadSurfaceStreamRequest:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ReadSurfaceStreamRequest"
    CancelSurfaceOperationRequest:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/CancelSurfaceOperationRequest"
    RejectSurfaceConfirmationRequest:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/RejectSurfaceConfirmationRequest"
    DisposeSurfaceRequest:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/DisposeSurfaceRequest"
    RPCRequest:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/RPCRequest"
    InvokeIntentRequest:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/InvokeIntentRequest"
    CancelOperationRequest:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/CancelOperationRequest"
    StartRuntimeRequest:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/StartRuntimeRequest"
    ExportDataRequest:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ExportDataRequest"
    ImportDataRequest:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ImportDataRequest"
    DeleteRetainedDataRequest:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/DeleteRetainedDataRequest"
    BindRetainedDataRequest:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/BindRetainedDataRequest"
    CleanupExpiredRetainedDataRequest:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/CleanupExpiredRetainedDataRequest"
    GrantPermissionRequest:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/GrantPermissionRequest"
    RevokePermissionRequest:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/RevokePermissionRequest"
    SecretRefRequest:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/SecretRefRequest"
    PatchSettingsRequest:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/PatchSettingsRequest"
  schemas:
    Envelope:
      type: object
      required: [ok]
      additionalProperties: false
      properties:
        ok: { type: boolean }
        data: true
        error: { type: string }
        error_code:
          $ref: "#/components/schemas/ErrorCode"
        error_details:
          $ref: "#/components/schemas/ErrorDetails"
      allOf:
        - if:
            properties:
              error_code: { const: PLUGIN_CAPABILITY_ERROR }
            required: [error_code]
          then:
            required: [error_details]
            properties:
              error_details:
                $ref: "#/components/schemas/CapabilityBusinessErrorDetails"
    ErrorDetails:
