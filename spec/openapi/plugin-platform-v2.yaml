      type: object
      additionalProperties: false
      required: [events, done]
      properties:
        events:
          type: array
          items:
            $ref: "#/components/schemas/StreamEvent"
        done: { type: boolean }
        terminal_status:
          enum: [closed, canceled, failed, orphaned_after_disable, orphaned_after_uninstall]
        next_stream_ticket: { type: string, minLength: 1 }
        next_stream_ticket_id: { type: string, pattern: '^st_[A-Za-z0-9_-]+$' }
        next_stream_expires_at: { type: string, format: date-time }
      allOf:
        - if:
            properties: { done: { const: false } }
            required: [done]
          then:
            required: [next_stream_ticket, next_stream_ticket_id, next_stream_expires_at]
            not:
              required: [terminal_status]
        - if:
            properties: { done: { const: true } }
            required: [done]
          then:
            required: [terminal_status]
            not:
              anyOf:
                - required: [next_stream_ticket]
                - required: [next_stream_ticket_id]
                - required: [next_stream_expires_at]
