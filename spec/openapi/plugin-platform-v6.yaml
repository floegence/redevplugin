      additionalProperties: false
      properties:
        worker_count: { type: integer, minimum: 1, maximum: 64, description: "Number of runtime worker threads." }
        queue_capacity: { type: integer, minimum: 1, maximum: 64, description: "Maximum queued worker invocations." }
        per_plugin_concurrency: { type: integer, minimum: 1, maximum: 64, description: "Maximum concurrent invocations for one plugin; must not exceed worker_count." }
        module_cache_entries: { type: integer, minimum: 1, maximum: 1024, description: "Maximum compiled modules retained by the runtime cache." }
        module_cache_source_bytes: { type: integer, minimum: 1, maximum: 134217728, description: "Maximum source WASM bytes retained by the runtime cache (128 MiB)." }
