openapi: 3.1.0
info:
  title: ReDevPlugin Plugin Platform API
  version: plugin-platform-v6
  description: Host-agnostic plugin management, bridge, operation, data, and sandbox routes. Release-ref install and update routes resolve host-controlled package artifacts server-side and do not accept requested trust_state values; local-import package install/update routes are explicit developer/import flows and also do not accept caller-supplied trust_state values.
x-redevplugin-query-policy:
  reject_unknown_parameters: true
  reject_duplicate_parameters: true
paths:
  /_redevplugin/api/plugins/local-imports:
    post:
      operationId: importLocalPackage
      parameters:
        - name: plugin_instance_id
          in: query
          required: false
          schema: { type: string, minLength: 1 }
      requestBody:
        required: true
        content:
          application/vnd.redevplugin.package+zip:
            schema: { type: string, format: binary }
      responses:
        "200": { $ref: "#/components/responses/PluginRecordResponse" }
        default: { $ref: "#/components/responses/MutationPlatformErrorResponse" }
  /_redevplugin/api/plugins/install-release-ref:
    post:
      operationId: installReleaseRef
      requestBody:
        $ref: "#/components/requestBodies/InstallReleaseRefRequest"
      responses:
        "200": { $ref: "#/components/responses/PluginRecordResponse" }
        default: { $ref: "#/components/responses/MutationPlatformErrorResponse" }
  /_redevplugin/api/plugins/enable:
    post:
      operationId: enablePlugin
      requestBody:
        $ref: "#/components/requestBodies/EnableRequest"
      responses:
        "200": { $ref: "#/components/responses/PluginRecordResponse" }
        default: { $ref: "#/components/responses/MutationPlatformErrorResponse" }
  /_redevplugin/api/plugins/disable:
    post:
      operationId: disablePlugin
      requestBody:
        $ref: "#/components/requestBodies/DisableRequest"
      responses:
        "200": { $ref: "#/components/responses/PluginRecordResponse" }
        default: { $ref: "#/components/responses/MutationPlatformErrorResponse" }
  /_redevplugin/api/plugins/uninstall:
    post:
      operationId: uninstallPlugin
      requestBody:
        $ref: "#/components/requestBodies/UninstallRequest"
      responses:
        "200": { $ref: "#/components/responses/PluginRecordResponse" }
        default: { $ref: "#/components/responses/MutationPlatformErrorResponse" }
  /_redevplugin/api/plugins/{plugin_instance_id}/local-import:
    put:
      operationId: updateLocalPackage
      parameters:
        - name: plugin_instance_id
          in: path
          required: true
          schema: { type: string, minLength: 1 }
        - name: expected_management_revision
          in: query
          required: true
          schema: { type: integer, minimum: 1, maximum: 9007199254740991 }
      requestBody:
        required: true
        content:
          application/vnd.redevplugin.package+zip:
            schema: { type: string, format: binary }
      responses:
        "200": { $ref: "#/components/responses/PluginRecordResponse" }
        default: { $ref: "#/components/responses/MutationPlatformErrorResponse" }
  /_redevplugin/api/plugins/update-release-ref:
    post:
      operationId: updateReleaseRef
      requestBody:
        $ref: "#/components/requestBodies/UpdateReleaseRefRequest"
      responses:
        "200": { $ref: "#/components/responses/PluginRecordResponse" }
        default: { $ref: "#/components/responses/MutationPlatformErrorResponse" }
  /_redevplugin/api/plugins/downgrade:
    post:
      operationId: downgradePlugin
      requestBody:
        $ref: "#/components/requestBodies/DowngradeRequest"
      responses:
        "200": { $ref: "#/components/responses/PluginRecordResponse" }
        default: { $ref: "#/components/responses/MutationPlatformErrorResponse" }
  /_redevplugin/api/plugins/catalog:
    get:
      operationId: listPlugins
      responses:
        "200": { $ref: "#/components/responses/PluginCatalogResponse" }
        default: { $ref: "#/components/responses/PlatformErrorResponse" }
  /_redevplugin/api/plugins/features:
    get:
      operationId: getPluginFeatures
      responses:
        "200": { $ref: "#/components/responses/PluginFeaturesResponse" }
        default: { $ref: "#/components/responses/PlatformErrorResponse" }
  /_redevplugin/api/plugins/platform/compatibility:
    get:
      operationId: getPluginPlatformCompatibility
      description: Returns the host-consumable ReDevPlugin compatibility manifest for the mounted platform artifact set.
      responses:
        "200": { $ref: "#/components/responses/CompatibilityResponse" }
        default: { $ref: "#/components/responses/PlatformErrorResponse" }
  /_redevplugin/api/plugins/surfaces/open:
    post:
      operationId: openPluginSurface
      requestBody:
        $ref: "#/components/requestBodies/OpenSurfaceRequest"
      responses:
        "200": { $ref: "#/components/responses/SurfaceBootstrapResponse" }
        default: { $ref: "#/components/responses/MutationPlatformErrorResponse" }
  /_redevplugin/api/plugins/surfaces/revoke-scope:
    post:
      operationId: revokePluginSurfaceScope
      description: Revokes every active plugin surface and token bound to the authenticated owner session or session channel derived by the host.
      requestBody:
        $ref: "#/components/requestBodies/RevokeSurfaceScopeRequest"
      responses:
        "200": { $ref: "#/components/responses/SurfaceScopeRevokeResponse" }
        default: { $ref: "#/components/responses/MutationPlatformErrorResponse" }
  /_redevplugin/api/plugins/surfaces/{surface_instance_id}/prepare:
    post:
      operationId: preparePluginSurface
      parameters:
        - $ref: "#/components/parameters/SurfaceInstanceID"
      requestBody:
        $ref: "#/components/requestBodies/PrepareSurfaceRequest"
      responses:
        "200": { $ref: "#/components/responses/SurfacePreparationResponse" }
        default: { $ref: "#/components/responses/MutationPlatformErrorResponse" }
  /_redevplugin/api/plugins/surfaces/{surface_instance_id}/bridge-token:
    post:
      operationId: createSurfaceBridgeToken
      parameters:
        - $ref: "#/components/parameters/SurfaceInstanceID"
      requestBody:
        $ref: "#/components/requestBodies/TrustedParentBridgeTokenRequest"
      responses:
        "200": { $ref: "#/components/responses/BridgeTokenResponse" }
        default: { $ref: "#/components/responses/MutationPlatformErrorResponse" }
  /_redevplugin/api/plugins/surfaces/{surface_instance_id}/assets/read:
    post:
      operationId: readPreparedSurfaceAsset
      parameters:
        - $ref: "#/components/parameters/SurfaceInstanceID"
      requestBody:
        $ref: "#/components/requestBodies/ReadSurfaceAssetRequest"
      responses:
        "200": { $ref: "#/components/responses/SurfaceAssetResponse" }
        default: { $ref: "#/components/responses/PlatformErrorResponse" }
  /_redevplugin/api/plugins/surfaces/{surface_instance_id}/streams/read:
    post:
      operationId: readPreparedSurfaceStream
      parameters:
        - $ref: "#/components/parameters/SurfaceInstanceID"
      requestBody:
        $ref: "#/components/requestBodies/ReadSurfaceStreamRequest"
      responses:
        "200": { $ref: "#/components/responses/SurfaceStreamResponse" }
        default: { $ref: "#/components/responses/PlatformErrorResponse" }
  /_redevplugin/api/plugins/surfaces/{surface_instance_id}/streams/ack:
    post:
      operationId: acknowledgePreparedSurfaceStream
      parameters:
        - $ref: "#/components/parameters/SurfaceInstanceID"
      requestBody:
        $ref: "#/components/requestBodies/AcknowledgeSurfaceStreamRequest"
      responses:
        "200": { $ref: "#/components/responses/SurfaceStreamAcknowledgementResponse" }
        default: { $ref: "#/components/responses/MutationPlatformErrorResponse" }
  /_redevplugin/api/plugins/surfaces/{surface_instance_id}/operations/cancel:
    post:
      operationId: cancelSurfacePluginOperation
      description: Cancels an operation only when it belongs to the authenticated surface, session, and private bridge channel.
      parameters:
        - $ref: "#/components/parameters/SurfaceInstanceID"
      requestBody:
        $ref: "#/components/requestBodies/CancelSurfaceOperationRequest"
      responses:
        "200": { $ref: "#/components/responses/OperationRecordResponse" }
        default: { $ref: "#/components/responses/MutationPlatformErrorResponse" }
  /_redevplugin/api/plugins/surfaces/{surface_instance_id}/confirmations/reject:
    post:
      operationId: rejectSurfacePluginConfirmation
      description: Atomically rejects a pending confirmation only when it belongs to the authenticated surface, session, current plugin revision, and private bridge channel.
      parameters:
        - $ref: "#/components/parameters/SurfaceInstanceID"
      requestBody:
        $ref: "#/components/requestBodies/RejectSurfaceConfirmationRequest"
      responses:
        "200": { $ref: "#/components/responses/ConfirmationRejectionResponse" }
        default: { $ref: "#/components/responses/MutationPlatformErrorResponse" }
  /_redevplugin/api/plugins/surfaces/{surface_instance_id}/dispose:
    post:
      operationId: disposePluginSurface
      parameters:
        - $ref: "#/components/parameters/SurfaceInstanceID"
      requestBody:
        $ref: "#/components/requestBodies/DisposeSurfaceRequest"
      responses:
        "200": { $ref: "#/components/responses/SurfaceDisposeResponse" }
        default: { $ref: "#/components/responses/MutationPlatformErrorResponse" }
  /_redevplugin/api/plugins/rpc:
    post:
      operationId: callPluginMethod
      requestBody:
        $ref: "#/components/requestBodies/RPCRequest"
      responses:
        "200": { $ref: "#/components/responses/RPCResponse" }
        default: { $ref: "#/components/responses/MutationPlatformErrorResponse" }
  /_redevplugin/api/plugins/confirmations/prepare:
    post:
      operationId: preparePluginMethodConfirmation
      requestBody:
        $ref: "#/components/requestBodies/PrepareMethodConfirmationRequest"
      responses:
        "200": { $ref: "#/components/responses/PluginMethodConfirmationPreparationResponse" }
        default: { $ref: "#/components/responses/MutationPlatformErrorResponse" }
  /_redevplugin/api/plugins/intents:
    get:
      operationId: listPluginIntents
      description: 'Lists enabled, runnable plugin intents available to host-mediated interop. The response data is `{ "intents": [...] }`.'
      parameters:
        - name: intent_id
          in: query
          schema: { type: string, minLength: 1 }
        - name: plugin_instance_id
          in: query
          schema: { type: string, minLength: 1 }
      responses:
        "200": { $ref: "#/components/responses/IntentListResponse" }
        default: { $ref: "#/components/responses/PlatformErrorResponse" }
  /_redevplugin/api/plugins/intents/invoke:
    post:
      operationId: invokePluginIntent
      description: Invokes a host-mediated plugin intent without iframe gateway tokens while preserving local policy, permission grants, and dangerous-method fail-closed checks.
      requestBody:
        $ref: "#/components/requestBodies/InvokeIntentRequest"
      responses:
        "200": { $ref: "#/components/responses/RPCResponse" }
        default: { $ref: "#/components/responses/MutationPlatformErrorResponse" }
  /_redevplugin/api/plugins/operations:
    get:
      operationId: listPluginOperations
      parameters:
        - name: plugin_instance_id
          in: query
          required: false
          schema: { type: string, minLength: 1 }
        - name: cursor
          in: query
          required: false
          schema: { type: string, minLength: 1, maxLength: 1024 }
        - name: limit
          in: query
          required: false
          schema: { type: integer, minimum: 1, maximum: 500, default: 100 }
      responses:
        "200": { $ref: "#/components/responses/OperationListResponse" }
        default: { $ref: "#/components/responses/PlatformErrorResponse" }
  /_redevplugin/api/plugins/operations/{operation_id}:
    get:
      operationId: getPluginOperation
      parameters:
        - $ref: "#/components/parameters/OperationID"
      responses:
        "200": { $ref: "#/components/responses/OperationRecordResponse" }
        default: { $ref: "#/components/responses/PlatformErrorResponse" }
  /_redevplugin/api/plugins/operations/{operation_id}/cancel:
    post:
      operationId: cancelPluginOperation
      parameters:
        - $ref: "#/components/parameters/OperationID"
      requestBody:
        $ref: "#/components/requestBodies/CancelOperationRequest"
      responses:
        "200": { $ref: "#/components/responses/OperationRecordResponse" }
        default: { $ref: "#/components/responses/MutationPlatformErrorResponse" }
  /_redevplugin/api/plugins/runtime/start:
    post:
      operationId: startPluginRuntime
      requestBody:
        $ref: "#/components/requestBodies/StartRuntimeRequest"
      responses:
        "200": { $ref: "#/components/responses/RuntimeHealthResponse" }
        default: { $ref: "#/components/responses/MutationPlatformErrorResponse" }
  /_redevplugin/api/plugins/runtime/stop:
    post:
      operationId: stopPluginRuntime
      requestBody:
        $ref: "#/components/requestBodies/EmptyRequest"
      responses:
        "200": { $ref: "#/components/responses/RuntimeStopResponse" }
        default: { $ref: "#/components/responses/MutationPlatformErrorResponse" }
  /_redevplugin/api/plugins/runtime/refresh-enabled:
    post:
      operationId: refreshEnabledPluginRuntimeState
      description: 'Replays runtime-derived state for enabled plugins after the embedding host process restarts or reattaches adapters. The response data is `{ "results": [...] }`.'
      requestBody:
        $ref: "#/components/requestBodies/EmptyRequest"
      responses:
        "200": { $ref: "#/components/responses/RuntimeRefreshResponse" }
        default: { $ref: "#/components/responses/MutationPlatformErrorResponse" }
  /_redevplugin/api/plugins/runtime/health:
    get:
      operationId: getPluginRuntimeHealth
      responses:
        "200": { $ref: "#/components/responses/RuntimeHealthResponse" }
        default: { $ref: "#/components/responses/PlatformErrorResponse" }
  /_redevplugin/api/plugins/data/export:
    post:
      operationId: exportPluginData
      requestBody:
        $ref: "#/components/requestBodies/ExportDataRequest"
      responses:
        "200": { $ref: "#/components/responses/DataExportResponse" }
        default: { $ref: "#/components/responses/MutationPlatformErrorResponse" }
  /_redevplugin/api/plugins/data/export/delete:
    post:
      operationId: deletePluginDataExport
      requestBody:
        $ref: "#/components/requestBodies/DeleteDataExportRequest"
      responses:
        "200": { $ref: "#/components/responses/DataExportDeleteResponse" }
        default: { $ref: "#/components/responses/MutationPlatformErrorResponse" }
  /_redevplugin/api/plugins/data/import:
    post:
      operationId: importPluginData
      requestBody:
        $ref: "#/components/requestBodies/ImportDataRequest"
      responses:
        "200": { $ref: "#/components/responses/DataImportResponse" }
        default: { $ref: "#/components/responses/MutationPlatformErrorResponse" }
  /_redevplugin/api/plugins/retained-data:
    get:
      operationId: listPluginRetainedData
      parameters:
        - name: plugin_instance_id
          in: query
          schema: { type: string, minLength: 1 }
      responses:
        "200": { $ref: "#/components/responses/RetainedDataListResponse" }
        default: { $ref: "#/components/responses/PlatformErrorResponse" }
  /_redevplugin/api/plugins/retained-data/delete:
    post:
      operationId: deletePluginRetainedData
      requestBody:
        $ref: "#/components/requestBodies/DeleteRetainedDataRequest"
      responses:
        "200": { $ref: "#/components/responses/RetainedDataBindingResponse" }
        default: { $ref: "#/components/responses/MutationPlatformErrorResponse" }
  /_redevplugin/api/plugins/retained-data/bind:
    post:
      operationId: bindPluginRetainedData
      requestBody:
        $ref: "#/components/requestBodies/BindRetainedDataRequest"
      responses:
        "200": { $ref: "#/components/responses/RetainedDataBindingResponse" }
        default: { $ref: "#/components/responses/MutationPlatformErrorResponse" }
  /_redevplugin/api/plugins/retained-data/cleanup-expired:
    post:
      operationId: cleanupExpiredPluginRetainedData
      requestBody:
        $ref: "#/components/requestBodies/CleanupExpiredRetainedDataRequest"
      responses:
        "200": { $ref: "#/components/responses/RetainedDataCleanupResponse" }
        default: { $ref: "#/components/responses/MutationPlatformErrorResponse" }
  /_redevplugin/api/plugins/permissions:
    get:
      operationId: listPluginPermissionGrants
      parameters:
        - name: plugin_instance_id
          in: query
          schema: { type: string, minLength: 1 }
        - name: active_only
          in: query
          schema: { type: boolean }
      responses:
        "200": { $ref: "#/components/responses/PermissionListResponse" }
        default: { $ref: "#/components/responses/PlatformErrorResponse" }
  /_redevplugin/api/plugins/permissions/grant:
    post:
      operationId: grantPluginPermission
      requestBody:
        $ref: "#/components/requestBodies/GrantPermissionRequest"
      responses:
        "200": { $ref: "#/components/responses/PermissionMutationResponse" }
        default: { $ref: "#/components/responses/MutationPlatformErrorResponse" }
  /_redevplugin/api/plugins/permissions/revoke:
    post:
      operationId: revokePluginPermission
      requestBody:
        $ref: "#/components/requestBodies/RevokePermissionRequest"
      responses:
        "200": { $ref: "#/components/responses/PermissionMutationResponse" }
        default: { $ref: "#/components/responses/MutationPlatformErrorResponse" }
  /_redevplugin/api/plugins/security-policies:
    get:
      operationId: listPluginSecurityPolicies
      responses:
        "200": { $ref: "#/components/responses/SecurityPolicyListResponse" }
        default: { $ref: "#/components/responses/PlatformErrorResponse" }
  /_redevplugin/api/plugins/security-policies/{plugin_instance_id}:
    get:
      operationId: getPluginSecurityPolicy
      parameters:
        - $ref: "#/components/parameters/PluginInstanceID"
      responses:
        "200": { $ref: "#/components/responses/SecurityPolicyRecordResponse" }
        default: { $ref: "#/components/responses/PlatformErrorResponse" }
    put:
      operationId: putPluginSecurityPolicy
      parameters:
        - $ref: "#/components/parameters/PluginInstanceID"
      requestBody:
        $ref: "#/components/requestBodies/PutSecurityPolicyRequest"
      responses:
        "200": { $ref: "#/components/responses/SecurityPolicyRecordResponse" }
        default: { $ref: "#/components/responses/MutationPlatformErrorResponse" }
    delete:
      operationId: deletePluginSecurityPolicy
      parameters:
        - $ref: "#/components/parameters/PluginInstanceID"
      requestBody:
        $ref: "#/components/requestBodies/DeleteSecurityPolicyRequest"
      responses:
        "200": { $ref: "#/components/responses/SecurityPolicyDeleteResponse" }
        default: { $ref: "#/components/responses/MutationPlatformErrorResponse" }
  /_redevplugin/api/plugins/diagnostics:
    get:
      operationId: listPluginDiagnosticEvents
      parameters:
        - name: plugin_id
          in: query
          schema: { type: string, minLength: 1 }
        - name: plugin_instance_id
          in: query
          schema: { type: string, minLength: 1 }
        - name: surface_instance_id
          in: query
          schema: { type: string, minLength: 1 }
        - name: type
          in: query
          schema: { type: string, minLength: 1 }
        - name: severity
          in: query
          schema: { type: string, enum: [info, warning] }
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 1000, default: 100 }
      responses:
        "200": { $ref: "#/components/responses/DiagnosticEventListResponse" }
        default: { $ref: "#/components/responses/PlatformErrorResponse" }
  /_redevplugin/api/plugins/secrets/bind:
    post:
      operationId: bindPluginSecret
      requestBody:
        $ref: "#/components/requestBodies/SecretRefRequest"
      responses:
        "200": { $ref: "#/components/responses/SecretBindResponse" }
        default: { $ref: "#/components/responses/MutationPlatformErrorResponse" }
  /_redevplugin/api/plugins/secrets/test:
    post:
      operationId: testPluginSecret
      requestBody:
        $ref: "#/components/requestBodies/SecretRefRequest"
      responses:
        "200": { $ref: "#/components/responses/SecretTestResponse" }
        default: { $ref: "#/components/responses/MutationPlatformErrorResponse" }
  /_redevplugin/api/plugins/secrets/delete:
    post:
      operationId: deletePluginSecret
      requestBody:
        $ref: "#/components/requestBodies/SecretRefRequest"
      responses:
        "200": { $ref: "#/components/responses/SecretDeleteResponse" }
        default: { $ref: "#/components/responses/MutationPlatformErrorResponse" }
  /_redevplugin/api/plugins/{plugin_instance_id}/settings/schema:
    get:
      operationId: getPluginSettingsSchema
      parameters:
        - $ref: "#/components/parameters/PluginInstanceID"
        - $ref: "#/components/parameters/SettingsScope"
      responses:
        "200": { $ref: "#/components/responses/SettingsSchemaResponse" }
        default: { $ref: "#/components/responses/PlatformErrorResponse" }
  /_redevplugin/api/plugins/{plugin_instance_id}/settings:
    get:
      operationId: getPluginSettings
      parameters:
        - $ref: "#/components/parameters/PluginInstanceID"
        - $ref: "#/components/parameters/SettingsScope"
      responses:
        "200": { $ref: "#/components/responses/SettingsSnapshotResponse" }
        default: { $ref: "#/components/responses/PlatformErrorResponse" }
    patch:
      operationId: patchPluginSettings
      parameters:
        - $ref: "#/components/parameters/PluginInstanceID"
      requestBody:
        $ref: "#/components/requestBodies/PatchSettingsRequest"
      responses:
        "200": { $ref: "#/components/responses/SettingsSnapshotResponse" }
        default: { $ref: "#/components/responses/MutationPlatformErrorResponse" }
components:
  parameters:
    OperationID:
      name: operation_id
      in: path
      required: true
      schema: { type: string }
    PluginInstanceID:
      name: plugin_instance_id
      in: path
      required: true
      schema: { type: string }
    SettingsScope:
      name: scope
      in: query
      required: true
      schema: { $ref: "#/components/schemas/ResourceScopeKind" }
    SurfaceInstanceID:
      name: surface_instance_id
      in: path
      required: true
      schema: { type: string }
  responses:
    PlatformErrorResponse:
      description: Closed non-success response for read-only platform operations.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/PlatformErrorResponse"
    MutationPlatformErrorResponse:
      description: Closed non-success response for operations that may change durable platform state.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/MutationPlatformErrorResponse"
    RPCResponse:
      description: Typed plugin method result. Subscriptions always bind one operation and one stream.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/RPCSuccessResponse"
    SurfaceBootstrapResponse:
      description: Trusted-parent surface bootstrap. Capability-bearing fields are never forwarded into the opaque iframe or plugin worker.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/SurfaceBootstrapSuccessResponse"
    SurfacePreparationResponse:
      description: Trusted-parent asset-session exchange and validated opaque surface document.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/SurfacePreparationSuccessResponse"
    BridgeTokenResponse:
      description: Trusted-parent plugin gateway token response.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/BridgeTokenSuccessResponse"
    SurfaceAssetResponse:
      description: Trusted-parent package asset response. The plugin receives only a renderer-created blob URL.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/SurfaceAssetSuccessResponse"
    SurfaceStreamResponse:
      description: Trusted-parent stream redemption response. Stream tickets remain outside the plugin worker.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/SurfaceStreamSuccessResponse"
    SurfaceStreamAcknowledgementResponse:
      description: Confirms one exact stream delivery so the platform may release its events.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/SurfaceStreamAcknowledgementSuccessResponse"
    SurfaceDisposeResponse:
      description: Surface revocation response.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/SurfaceDisposeSuccessResponse"
    SurfaceScopeRevokeResponse:
      description: Authenticated owner-session surface revocation response.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/SurfaceScopeRevokeSuccessResponse"
    PluginRecordResponse:
      description: Plugin lifecycle response with typed registry trust assessment.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/PluginRecordSuccessResponse"
    PluginCatalogResponse:
      description: Installed plugin catalog response with typed registry records.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/PluginCatalogSuccessResponse"
    PluginFeaturesResponse:
      description: Closed set of optional host modules configured for this platform.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/PluginFeaturesSuccessResponse"
    CompatibilityResponse:
      description: Released platform compatibility manifest.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/CompatibilitySuccessResponse"
    PluginMethodConfirmationPreparationResponse:
      description: Prepared plugin method confirmation. The raw confirmation token stays server-side and is never returned to parent JavaScript or the plugin iframe.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/PluginMethodConfirmationPreparationSuccessResponse"
    ConfirmationRejectionResponse:
      description: Trusted-parent acknowledgement that the pending confirmation was atomically rejected and cannot be replayed.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ConfirmationRejectionSuccessResponse"
    IntentListResponse:
      description: Enabled plugin intent records.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/IntentListSuccessResponse"
    RetainedDataListResponse:
      description: Retained plugin data list response.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/RetainedDataListSuccessResponse"
    RetainedDataBindingResponse:
      description: Plugin data binding returned after a retained-data mutation.
      content:
        application/json:
          schema:
