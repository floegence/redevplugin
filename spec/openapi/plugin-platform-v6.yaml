      properties:
        plugin_instance_id: { type: string, minLength: 1 }
        version: { $ref: "#/components/schemas/StrictSemVer" }
        package_hash: { type: string }
        expected_management_revision: { type: integer, minimum: 1, maximum: 9007199254740991 }
    EnableRequest:
      type: object
      required: [plugin_instance_id, expected_management_revision]
      additionalProperties: false
      properties:
        plugin_instance_id: { type: string, minLength: 1 }
        expected_management_revision: { type: integer, minimum: 1, maximum: 9007199254740991 }
    DisableRequest:
      type: object
      required: [plugin_instance_id, expected_management_revision]
      additionalProperties: false
      properties:
        plugin_instance_id: { type: string, minLength: 1 }
        reason: { type: string }
        expected_management_revision: { type: integer, minimum: 1, maximum: 9007199254740991 }
    UninstallRequest:
      type: object
      required: [plugin_instance_id, delete_data, expected_management_revision]
      additionalProperties: false
      properties:
        plugin_instance_id: { type: string, minLength: 1 }
        delete_data: { type: boolean }
        expected_management_revision: { type: integer, minimum: 1, maximum: 9007199254740991 }
    OpenSurfaceRequest:
      type: object
      required: [plugin_instance_id, surface_id, expected_management_revision]
      additionalProperties: false
      properties:
        plugin_instance_id: { type: string, minLength: 1 }
        surface_id: { type: string, minLength: 1 }
        surface_instance_id: { type: string }
        expected_management_revision: { type: integer, minimum: 1, maximum: 9007199254740991 }
    RevokeSurfaceScopeRequest:
      type: object
      additionalProperties: false
      maxProperties: 0
    EmptyRequest:
      type: object
      additionalProperties: false
      maxProperties: 0
    SurfaceBootstrap:
      type: object
      additionalProperties: false
      required:
        - plugin_id
        - plugin_instance_id
        - plugin_version
        - surface_id
        - surface_instance_id
        - active_fingerprint
        - entry_path
        - entry_sha256
        - asset_session_nonce
        - management_revision
        - revoke_epoch
        - runtime_generation_id
        - asset_ticket
        - asset_ticket_id
        - bridge_nonce
        - issued_at
        - expires_at
      properties:
        plugin_id: { type: string, minLength: 1 }
        plugin_instance_id: { type: string, minLength: 1 }
        plugin_version: { $ref: "#/components/schemas/StrictSemVer" }
        surface_id: { type: string, minLength: 1 }
        surface_instance_id: { type: string, minLength: 1 }
        active_fingerprint: { type: string, minLength: 1 }
        entry_path: { type: string, minLength: 1 }
        entry_sha256: { type: string, pattern: '^sha256:[0-9a-f]{64}$' }
        asset_session_nonce: { type: string, minLength: 16 }
        management_revision: { type: integer, minimum: 1, maximum: 9007199254740991 }
        revoke_epoch: { type: integer, minimum: 1, maximum: 9007199254740991 }
        runtime_generation_id: { type: string, minLength: 1 }
        asset_ticket: { type: string, minLength: 1 }
        asset_ticket_id: { type: string, minLength: 1 }
        bridge_nonce: { type: string, minLength: 16 }
        issued_at: { type: string, format: date-time }
        expires_at: { type: string, format: date-time }
    PrepareSurfaceRequest:
      type: object
      required: [asset_ticket]
      additionalProperties: false
      properties:
        asset_ticket: { type: string, minLength: 1 }
    SurfacePreparation:
      type: object
      additionalProperties: false
      required:
        - asset_session
        - asset_session_id
        - asset_session_nonce
        - entry_path
        - entry_sha256
        - management_revision
        - revoke_epoch
        - issued_at
        - expires_at
        - document
      properties:
        asset_session: { type: string, minLength: 1 }
        asset_session_id: { type: string, minLength: 1 }
        asset_session_nonce: { type: string, minLength: 16 }
        entry_path: { type: string, minLength: 1 }
        entry_sha256: { type: string, pattern: '^sha256:[0-9a-f]{64}$' }
        management_revision: { type: integer, minimum: 1, maximum: 9007199254740991 }
        revoke_epoch: { type: integer, minimum: 1, maximum: 9007199254740991 }
        issued_at: { type: string, format: date-time }
        expires_at: { type: string, format: date-time }
        document:
          $ref: "../plugin/opaque-surface-document-v3.schema.json"
    TrustedParentBridgeHandshake:
      type: object
      required: [type, plugin_id, surface_id, surface_instance_id, active_fingerprint, bridge_nonce, asset_session_nonce, management_revision, revoke_epoch, ui_protocol_version]
      additionalProperties: false
      properties:
        type: { const: redevplugin.bridge.handshake }
        plugin_id: { type: string, minLength: 1 }
        surface_id: { type: string, minLength: 1 }
        surface_instance_id: { type: string, minLength: 1 }
        active_fingerprint: { type: string, minLength: 1 }
        bridge_nonce: { type: string, minLength: 16 }
        asset_session_nonce: { type: string, minLength: 16 }
        management_revision: { type: integer, minimum: 1, maximum: 9007199254740991 }
        revoke_epoch: { type: integer, minimum: 1, maximum: 9007199254740991 }
        ui_protocol_version: { const: plugin-ui-v5 }
    TrustedParentBridgeTokenRequest:
      type: object
      required: [handshake, bridge_channel_id, handshake_transcript_sha256]
      additionalProperties: false
      properties:
        handshake:
          $ref: "#/components/schemas/TrustedParentBridgeHandshake"
        bridge_channel_id: { type: string, minLength: 1 }
        handshake_transcript_sha256:
          type: string
          pattern: '^sha256:[0-9a-f]{64}$'
        previous_plugin_gateway_token:
          type: string
          minLength: 1
          description: Required only when renewing the current bridge channel lease.
    BridgeTokenResult:
      type: object
      additionalProperties: false
      required: [plugin_gateway_token, plugin_gateway_token_id, asset_session, asset_session_id, issued_at, expires_at]
      properties:
        plugin_gateway_token: { type: string, minLength: 1 }
        plugin_gateway_token_id: { type: string, minLength: 1 }
        asset_session: { type: string, minLength: 1 }
        asset_session_id: { type: string, minLength: 1 }
        issued_at: { type: string, format: date-time }
        expires_at: { type: string, format: date-time }
    ReadSurfaceAssetRequest:
      type: object
      additionalProperties: false
      required: [asset_session, asset_session_id, binding_id]
      properties:
        asset_session: { type: string, minLength: 1 }
        asset_session_id: { type: string, minLength: 1 }
        binding_id: { type: string, pattern: '^asset_[A-Za-z0-9_-]{8,128}$' }
    SurfaceAssetResult:
      type: object
      additionalProperties: false
      required: [path, sha256, content_type, content_base64]
      properties:
        path: { type: string, minLength: 1 }
        sha256: { type: string, pattern: '^sha256:[0-9a-f]{64}$' }
        content_type: { type: string, minLength: 1 }
        content_base64: { type: string, contentEncoding: base64 }
    ReadSurfaceStreamRequest:
      type: object
      additionalProperties: false
      required: [stream_id, stream_ticket, read_id]
      properties:
        stream_id: { type: string, minLength: 1 }
        stream_ticket: { type: string, minLength: 1 }
        read_id: { type: string, pattern: '^read_[A-Za-z0-9_-]{8,128}$' }
    AcknowledgeSurfaceStreamRequest:
      type: object
      additionalProperties: false
      required: [stream_id, stream_ticket, delivery_id]
      properties:
        stream_id: { type: string, minLength: 1 }
        stream_ticket: { type: string, minLength: 1 }
        delivery_id: { type: string, pattern: '^delivery_[A-Za-z0-9_-]{8,128}$' }
    SurfaceStreamResult:
      type: object
      additionalProperties: false
      required: [read_id, events, done]
      properties:
        delivery_id: { type: string, pattern: '^delivery_[A-Za-z0-9_-]{8,128}$' }
        read_id: { type: string, pattern: '^read_[A-Za-z0-9_-]{8,128}$' }
        events:
          type: array
          items:
            $ref: "#/components/schemas/StreamEvent"
        done: { type: boolean }
        terminal_status:
          enum: [closed, canceled, failed, orphaned_after_disable, orphaned_after_uninstall]
      allOf:
        - if:
            properties: { events: { minItems: 1 } }
            required: [events]
          then:
            required: [delivery_id]
        - if:
            properties: { done: { const: false } }
            required: [done]
          then:
            not:
              required: [terminal_status]
        - if:
            properties: { done: { const: true } }
            required: [done]
          then:
            required: [delivery_id, terminal_status]
    SurfaceStreamAcknowledgementResult:
      type: object
      required: [acknowledged]
      additionalProperties: false
      properties:
        acknowledged: { const: true }
    CancelSurfaceOperationRequest:
      type: object
      additionalProperties: false
      required: [operation_id, bridge_channel_id]
      properties:
        operation_id: { type: string, pattern: '^operation_[A-Za-z0-9_-]{8,150}$' }
        bridge_channel_id: { type: string, minLength: 1, maxLength: 256 }
        reason: { type: string, maxLength: 256 }
    RejectSurfaceConfirmationRequest:
      type: object
      additionalProperties: false
      required: [plugin_instance_id, bridge_channel_id, plugin_gateway_token, confirmation_id]
      properties:
        plugin_instance_id: { type: string, minLength: 1 }
        bridge_channel_id: { type: string, minLength: 1, maxLength: 256 }
        plugin_gateway_token: { type: string, minLength: 1 }
        confirmation_id: { type: string, pattern: '^confirmation_[A-Za-z0-9_-]{8,128}$' }
    ConfirmationRejectionResult:
      type: object
      additionalProperties: false
      required: [rejected]
      properties:
        rejected: { const: true }
    StreamEvent:
      type: object
      additionalProperties: false
      required: [stream_id, sequence, kind, at]
      properties:
        stream_id: { type: string, minLength: 1 }
        sequence: { type: integer, minimum: 0 }
        kind: { type: string, minLength: 1 }
        data: { type: string, contentEncoding: base64 }
        error: { type: string }
        at: { type: string, format: date-time }
    DisposeSurfaceRequest:
      type: object
      additionalProperties: false
      required: [bridge_nonce]
      properties:
        bridge_nonce: { type: string, minLength: 16 }
    RPCRequest:
      type: object
      required: [plugin_instance_id, surface_instance_id, bridge_channel_id, plugin_gateway_token, method]
      additionalProperties: false
      properties:
        plugin_instance_id: { type: string, minLength: 1 }
        surface_instance_id: { type: string, minLength: 1 }
        bridge_channel_id: { type: string, minLength: 1 }
        plugin_gateway_token: { type: string, minLength: 1 }
        confirmation_id: { type: string }
        method: { type: string, minLength: 1 }
        params:
          type: object
          additionalProperties: true
    PrepareMethodConfirmationRequest:
      type: object
      required: [plugin_instance_id, surface_instance_id, bridge_channel_id, plugin_gateway_token, method]
      additionalProperties: false
      properties:
        plugin_instance_id: { type: string, minLength: 1 }
        surface_instance_id: { type: string, minLength: 1 }
        bridge_channel_id: { type: string, minLength: 1 }
        plugin_gateway_token: { type: string, minLength: 1 }
        method: { type: string, minLength: 1 }
        params:
          type: object
          additionalProperties: true
    RPCResult:
      oneOf:
        - type: object
          additionalProperties: false
          properties:
            data: true
          not:
            anyOf:
              - required: [operation_id]
              - required: [stream_id]
              - required: [confirmation_required]
        - type: object
          additionalProperties: false
          required: [operation_id]
          properties:
            data: true
            operation_id: { type: string, minLength: 1 }
        - type: object
          additionalProperties: false
          required: [operation_id, stream_id, stream_ticket, stream_ticket_id, stream_expires_at]
          properties:
            data: true
            operation_id: { type: string, minLength: 1 }
            stream_id: { type: string, minLength: 1 }
            stream_ticket: { type: string, minLength: 1 }
            stream_ticket_id: { type: string, minLength: 1 }
            stream_expires_at: { type: string, format: date-time }
        - type: object
          additionalProperties: false
          required: [confirmation_required, confirmation_token_id, request_hash, plan_hash]
          properties:
            confirmation_required: { const: true }
            confirmation_token_id: { type: string, minLength: 1 }
            request_hash: { type: string, pattern: '^sha256:[0-9a-f]{64}$' }
            plan_hash: { type: string, pattern: '^sha256:[0-9a-f]{64}$' }
    RiskFlag:
      type: object
      required: [id, severity, summary]
      additionalProperties: false
      properties:
        id:
          type: string
          minLength: 1
          description: Stable machine-readable risk identifier.
        severity:
          type: string
          enum: [info, low, medium, high, critical]
        summary: { type: string, minLength: 1 }
        description: { type: string }
        requires_confirmation: { type: boolean }
        requires_admin: { type: boolean }
        data_loss_risk: { type: boolean }
        destructive: { type: boolean }
    RiskPlan:
      type: object
      required: [schema_version, summary, risk_flags]
      additionalProperties: false
      properties:
        schema_version: { const: redevplugin.capability.risk_plan.v1 }
        capability_id: { type: string }
        binding_id: { type: string }
        method: { type: string }
        target_method: { type: string }
        action: { type: string }
        effect:
          type: string
          enum: [read, write, execute, delete, admin]
        resource_ref: { type: string }
        resource_display_name: { type: string }
        summary: { type: string, minLength: 1 }
        risk_flags:
          type: array
          items:
            $ref: "#/components/schemas/RiskFlag"
        requires_confirmation: { type: boolean }
        requires_admin: { type: boolean }
        data_loss_risk: { type: boolean }
        destructive: { type: boolean }
        deny_reason: { type: string }
        details:
          type: object
          additionalProperties: true
    PluginMethodConfirmationPreparation:
      type: object
      required: [confirmation_id, confirmation_token_id, request_hash, plan_hash, expires_at]
      additionalProperties: false
      properties:
        confirmation_id: { type: string, minLength: 1 }
        confirmation_token_id:
          type: string
          minLength: 1
          description: Opaque audit/display id for the server-held confirmation token. It is not a credential.
        request_hash:
          type: string
          pattern: "^sha256:[0-9a-f]{64}$"
        plan_hash:
          type: string
          pattern: "^sha256:[0-9a-f]{64}$"
        plan:
          description: Host-redacted confirmation plan payload returned by the declared preflight method, when available.
          oneOf:
            - $ref: "#/components/schemas/RiskPlan"
            - type: object
              additionalProperties: true
        expires_at: { type: string, format: date-time }
    InvokeIntentRequest:
      type: object
      required: [intent_id]
      additionalProperties: false
      properties:
        plugin_instance_id: { type: string }
        intent_id: { type: string, minLength: 1 }
        params:
          type: object
          additionalProperties: true
    CancelOperationRequest:
      type: object
      additionalProperties: false
      properties:
        reason: { type: string }
    CapabilityContractPin:
      $ref: "../plugin/host-capability-pin-v1.schema.json"
    ExecutionBinding:
      type: object
      description: Immutable execution fields embedded into operation and stream records.
      required:
        - invocation_id
        - audit_correlation_id
        - publisher_id
        - plugin_id
        - plugin_instance_id
        - plugin_version
        - active_fingerprint
        - route_kind
        - capability_id
        - capability_version
        - binding_id
        - method
        - target_method
        - effect
        - execution
        - permissions
        - confirmation
        - revision
        - quota
        - target
        - target_descriptor_sha256
      properties:
        invocation_id: { type: string, minLength: 1 }
        audit_correlation_id: { type: string, minLength: 1 }
        operation_id: { type: string, minLength: 1 }
        stream_id: { type: string, minLength: 1 }
        publisher_id: { type: string, minLength: 1 }
        plugin_id: { type: string, minLength: 1 }
        plugin_instance_id: { type: string, minLength: 1 }
        plugin_version: { $ref: "#/components/schemas/StrictSemVer" }
        active_fingerprint: { type: string, minLength: 1 }
        surface_instance_id: { type: string }
        bridge_channel_id: { type: string }
        route_kind: { type: string, enum: [capability, worker, core_action] }
        capability_id: { type: string, minLength: 1 }
        capability_version: { $ref: "#/components/schemas/StrictSemVer" }
        binding_id: { type: string, minLength: 1 }
        contract:
          $ref: "#/components/schemas/CapabilityContractPin"
        method: { type: string, minLength: 1 }
        target_method: { type: string, minLength: 1 }
        effect: { type: string, enum: [read, write, execute, delete, admin] }
        execution: { type: string, enum: [sync, operation, subscription] }
        permissions:
          type: object
          additionalProperties: false
          required: [required, granted]
          properties:
            required: { type: array, items: { type: string } }
            granted: { type: array, items: { type: string } }
        confirmation:
          type: object
          additionalProperties: false
          required: [required, confirmed]
          properties:
            required: { type: boolean }
            confirmed: { type: boolean }
            confirmation_id: { type: string }
            request_sha256: { type: string }
            plan_sha256: { type: string }
            target_sha256: { type: string }
        revision:
          type: object
          additionalProperties: false
          required: [policy_revision, management_revision, revoke_epoch]
          properties:
            policy_revision: { type: integer, minimum: 0, maximum: 9007199254740991 }
            management_revision: { type: integer, minimum: 0, maximum: 9007199254740991 }
            revoke_epoch: { type: integer, minimum: 0, maximum: 9007199254740991 }
        quota:
          type: object
          additionalProperties: false
          properties:
            max_concurrent: { type: integer, minimum: 0 }
            max_duration_ms: { type: integer, minimum: 0 }
            max_stream_bytes: { type: integer, minimum: 0 }
            expires_at: { type: string, format: date-time }
        target:
          type: object
          additionalProperties: false
          required: [kind, fields]
          properties:
            kind: { type: string, minLength: 1 }
            fields: { type: object, additionalProperties: true }
        target_descriptor_sha256: { type: string, pattern: '^sha256:[0-9a-f]{64}$' }
        stream_event_type_name: { type: string, minLength: 1 }
        stream_event_schema_sha256: { type: string, pattern: '^[0-9a-f]{64}$' }
      oneOf:
        - required: [route_kind, contract]
          properties:
            route_kind: { const: capability }
        - required: [route_kind]
          properties:
            route_kind: { const: worker }
          not:
            required: [contract]
        - required: [route_kind]
          properties:
            route_kind: { const: core_action }
          not:
            required: [contract]
    OperationRecord:
      allOf:
        - $ref: "#/components/schemas/ExecutionBinding"
        - type: object
          required:
            - operation_id
            - cancelable
            - created_at
            - updated_at
          properties:
            operation_id: { type: string, minLength: 1 }
            execution: { type: string, enum: [operation, subscription] }
            cancelable: { type: boolean }
            cancel_ack_timeout_ms: { type: integer, minimum: 0 }
            disable_behavior: { type: string, enum: [cancel, orphan, wait] }
            uninstall_behavior: { type: string, enum: [cancel_then_block_delete, force_cleanup_allowed] }
            created_at: { type: string, format: date-time }
            updated_at: { type: string, format: date-time }
            cancel_requested_at: { type: string, format: date-time }
            orphaned_at: { type: string, format: date-time }
            terminal_at: { type: string, format: date-time }
          oneOf:
            - type: object
              required: [status, failure_code, reason]
              properties:
                status: { const: failed }
                failure_code: { $ref: "#/components/schemas/ExecutionFailureCode" }
                reason: { const: "execution failed" }
            - type: object
              required: [status]
              properties:
                status:
                  enum: [running, cancel_requested, canceled, completed, orphaned_after_disable, orphaned_after_uninstall]
                reason: { type: string }
              not:
                required: [failure_code]
      unevaluatedProperties: false
    ExecutionFailureCode:
      type: string
      enum: [adapter_failed, contract_invalid, platform_failed, quota_exceeded, runtime_failed]
    StartRuntimeRequest:
      type: object
      required: [target]
      additionalProperties: false
      properties:
        target: { $ref: "#/components/schemas/RuntimeTarget" }
    ExportDataRequest:
      type: object
      required: [plugin_instance_id]
      additionalProperties: false
      properties:
        plugin_instance_id: { type: string, minLength: 1 }
    DeleteDataExportRequest:
      type: object
      required: [plugin_instance_id, bundle_ref]
      additionalProperties: false
      properties:
        plugin_instance_id: { type: string, minLength: 1 }
        bundle_ref: { type: string, minLength: 1 }
    ImportDataRequest:
      type: object
      required: [plugin_instance_id, bundle_ref, expected_management_revision]
      additionalProperties: false
      properties:
