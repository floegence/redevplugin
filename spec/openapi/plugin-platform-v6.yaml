        source_id: { type: string, minLength: 1 }
        release_metadata_ref: { type: string, minLength: 1 }
        release_metadata_sha256: { type: string, pattern: "^(sha256:)?[0-9a-f]{64}$" }
        publisher_id: { type: string, minLength: 1 }
        plugin_id: { type: string, minLength: 1 }
        version: { $ref: "#/components/schemas/StrictSemVer" }
        expected_hashes:
          $ref: "#/components/schemas/PackageHashSet"
    InstallReleaseRefRequest:
      type: object
      required: [release_ref]
