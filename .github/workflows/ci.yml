name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  go:
    name: Go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: rustup show
      - run: GOWORK=off go test ./...

  typescript:
    name: TypeScript and Browser Demo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run check

  rust:
    name: Rust Runtime
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: rustup show
      - run: cargo fmt --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace
      - name: Cargo deny
        run: |
          cargo install cargo-deny --locked
          cargo deny check

  release-audit:
    name: Release Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: rustup show
      - run: ./scripts/check_redevplugin_release_audit.sh
        env:
          REDEVPLUGIN_INSTALL_AUDIT_TOOLS: "1"

  stress-fast:
    name: Stress Fast Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Shell syntax
        run: |
          bash -n scripts/check_redevplugin_platform.sh
          bash -n scripts/check_redevplugin_runtime_contract.sh
          bash -n scripts/check_redevplugin_release_audit.sh
          bash -n scripts/verify_redevplugin_release_artifacts.sh
          bash -n scripts/check_redevplugin_stress.sh
          bash -n scripts/check_redevplugin_ui_bridge.sh
          bash -n scripts/build_redevplugin_release.sh
      - run: ./scripts/check_redevplugin_stress.sh --fast --summary dist/redevplugin-stress-fast.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: redevplugin-stress-fast
          path: dist/redevplugin-stress-fast.json
          if-no-files-found: ignore

  contracts:
    name: Platform Contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: ./scripts/check_redevplugin_runtime_contract.sh
      - run: ./scripts/check_redevplugin_platform.sh

  release-bundle-smoke:
    name: Release Bundle Smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: ./scripts/build_redevplugin_release.sh --version 0.0.0-ci.0
      - run: ./dist/redevplugin-release/bin/redevplugin verify-compatibility ./dist/redevplugin-release/compatibility.json ./dist/redevplugin-release/contracts
      - run: node scripts/verify_redevplugin_release_bundle.mjs ./dist/redevplugin-release 0.0.0-ci.0
