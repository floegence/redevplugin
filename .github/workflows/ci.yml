name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  go:
    name: Go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: GOWORK=off go test ./...

  typescript:
    name: TypeScript and Browser Demo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run check

  rust:
    name: Rust Runtime
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: rustup show
      - run: cargo fmt --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace
      - name: Cargo deny
        run: |
          cargo install cargo-deny --locked
          cargo deny check

  contracts:
    name: Platform Contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: ./scripts/check_redevplugin_runtime_contract.sh
      - run: ./scripts/check_redevplugin_platform.sh

  release-bundle-smoke:
    name: Release Bundle Smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: ./scripts/build_redevplugin_release.sh --version 0.0.0-ci.0
      - run: ./dist/redevplugin-release/bin/redevplugin verify-compatibility ./dist/redevplugin-release/compatibility.json ./dist/redevplugin-release/contracts
      - name: Verify bundled versions
        run: |
          node --input-type=module <<'NODE'
          import { readdirSync, readFileSync, rmSync } from "node:fs";
          import { execFileSync } from "node:child_process";
          const expected = "0.0.0-ci.0";
          const manifest = JSON.parse(readFileSync("dist/redevplugin-release/compatibility.json", "utf8"));
          for (const key of ["redevplugin_go_version", "redevplugin_ui_version", "redevplugin_runtime_version"]) {
            if (manifest.matrix[key] !== expected) throw new Error(`${key}=${manifest.matrix[key]}`);
          }
          const tarball = readdirSync("dist/redevplugin-release/npm").find((name) => name.endsWith(".tgz"));
          execFileSync("tar", ["-xzf", `dist/redevplugin-release/npm/${tarball}`, "-C", "/tmp"]);
          const pkg = JSON.parse(readFileSync("/tmp/package/package.json", "utf8"));
          rmSync("/tmp/package", { recursive: true, force: true });
          if (pkg.version !== expected) throw new Error(`npm package version=${pkg.version}`);
          const hello = '{"ipc_version":"rust-ipc-v1","frame_type":"hello","request_id":"hello-1","runtime_generation_id":"gen-1","payload":{}}\n';
          const output = execFileSync("./dist/redevplugin-release/bin/redevplugin-runtime", { input: hello, encoding: "utf8" }).trim().split("\n")[0];
          const ack = JSON.parse(output);
          if (ack.payload.runtime_version !== expected) throw new Error(`runtime version=${ack.payload.runtime_version}`);
          NODE
