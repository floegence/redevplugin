name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  audit-release:
    name: Release Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: rustup show
      - run: ./scripts/check_redevplugin_release_audit.sh
        env:
          REDEVPLUGIN_INSTALL_AUDIT_TOOLS: "1"

  stress-release:
    name: Release Stress Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: rustup show
      - run: ./scripts/check_redevplugin_stress.sh --release --summary dist/redevplugin-release-stress.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: redevplugin-release-stress
          path: dist/redevplugin-release-stress.json
          if-no-files-found: error

  runtime:
    name: Runtime ${{ matrix.target }}
    needs:
      - audit-release
      - stress-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - os: macos-15-intel
            target: x86_64-apple-darwin
          - os: macos-14
            target: aarch64-apple-darwin
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Build release bundle
        run: |
          tag="${GITHUB_REF_NAME:-manual}"
          if [[ "$tag" == v* ]]; then
            version="${tag#v}"
          else
            version="0.0.0-manual.${GITHUB_RUN_NUMBER:-0}"
          fi
          ./scripts/build_redevplugin_release.sh \
            --version "$version" \
            --runtime-target "${{ matrix.target }}" \
            --out-dir "dist/redevplugin-${tag}-${{ matrix.target }}"
      - name: Archive release bundle
        run: |
          tag="${GITHUB_REF_NAME:-manual}"
          tar -C dist -czf "dist/redevplugin-${tag}-${{ matrix.target }}.tar.gz" "redevplugin-${tag}-${{ matrix.target }}"
      - uses: actions/upload-artifact@v4
        with:
          name: redevplugin-${{ github.ref_name }}-${{ matrix.target }}
          path: dist/redevplugin-${{ github.ref_name }}-${{ matrix.target }}.tar.gz
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/')
    needs: runtime
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist/artifacts
          merge-multiple: true
      - name: Checksums
        run: |
          cd dist/artifacts
          sha256sum *.tar.gz redevplugin-release-stress.json > SHA256SUMS
      - uses: sigstore/cosign-installer@v3
      - name: Sign release artifacts
        run: |
          cd dist/artifacts
          for file in *.tar.gz redevplugin-release-stress.json SHA256SUMS; do
            cosign sign-blob --yes \
              --bundle "${file}.bundle" \
              --output-signature "${file}.sig" \
              "$file"
          done
      - name: Verify signed release artifacts
        run: ./scripts/verify_redevplugin_release_artifacts.sh dist/artifacts
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/artifacts/*.tar.gz
            dist/artifacts/*.tar.gz.sig
            dist/artifacts/*.tar.gz.bundle
            dist/artifacts/redevplugin-release-stress.json
            dist/artifacts/redevplugin-release-stress.json.sig
            dist/artifacts/redevplugin-release-stress.json.bundle
            dist/artifacts/SHA256SUMS
            dist/artifacts/SHA256SUMS.sig
            dist/artifacts/SHA256SUMS.bundle
