name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: redevplugin-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  preflight:
    name: Release Preflight
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.metadata.outputs.version }}
      label: ${{ steps.metadata.outputs.label }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - name: Resolve release metadata
        id: metadata
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            tag="$GITHUB_REF_NAME"
            version="${tag#v}"
            git fetch origin main --tags --force
            test "$(git rev-list -n 1 "$tag")" = "$GITHUB_SHA"
            git merge-base --is-ancestor "$GITHUB_SHA" origin/main
            ./scripts/assert_github_release_absent.sh "$GITHUB_REPOSITORY" "$tag"
            label="$tag"
          else
            version="0.0.0-manual.${GITHUB_RUN_NUMBER:-0}"
            label="manual-${GITHUB_RUN_NUMBER:-0}"
          fi
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            node scripts/check_redevplugin_release_metadata.mjs "$version"
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "label=$label" >> "$GITHUB_OUTPUT"

  quality-release:
    name: Complete Release Quality Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: rustup show
      - run: rustup target add wasm32-unknown-unknown
      - name: Property and regression corpus gate
        run: ./scripts/check_redevplugin_property_gates.sh --release
      - name: Go formatting
        run: test -z "$(gofmt -l .)"
      - run: GOWORK=off go list ./cmd/... ./examples/... ./pkg/...
      - run: GOWORK=off go test -p=1 ./cmd/... ./examples/... ./pkg/...
      - name: Install golangci-lint
        run: GOWORK=off go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.64.5
      - name: Go lint
        run: GOWORK=off golangci-lint run ./cmd/... ./examples/... ./pkg/...
      - name: TypeScript, Examples, and browser-harness checks
        run: npm run check
        env:
          REDEVPLUGIN_A2_EVIDENCE_DIR: dist/a2-quality
      - name: Canonical WASM native and Docker parity
        run: npm run examples:check:canonical && npm run scaffold:check:canonical
      - name: Bridge boundary checks
        run: ./scripts/check_redevplugin_ui_bridge.sh
      - run: cargo fmt --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace
      - name: Install cargo-deny
        run: cargo install cargo-deny@0.19.9 --locked
      - run: cargo deny check
      - run: ./scripts/check_redevplugin_runtime_contract.sh --ci
      - run: ./scripts/check_redevplugin_platform.sh --ci

  audit-release:
    name: Release Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: rustup show
      - run: ./scripts/check_redevplugin_release_audit.sh
        env:
          REDEVPLUGIN_INSTALL_AUDIT_TOOLS: "1"

  stress-release:
    name: Release Stress Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: rustup show
      - run: rustup target add wasm32-unknown-unknown
      - run: ./scripts/check_redevplugin_stress.sh --release --summary dist/redevplugin-release-stress.json
        env:
          REDEVPLUGIN_A2_EVIDENCE_DIR: dist
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: redevplugin-release-stress
          path: |
            dist/redevplugin-release-stress.json
            dist/redevplugin-a2-acceptance.json
            dist/redevplugin-a2-supported.png
            dist/redevplugin-a2-unsupported.png
          if-no-files-found: error

  performance-release:
    name: Immutable Release Performance Evidence
    needs:
      - preflight
      - quality-release
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: rustup show
      - run: rustup target add wasm32-unknown-unknown
      - name: Generate immutable release performance evidence
        run: |
          ./scripts/check_redevplugin_performance.sh \
            --release \
            --output dist/performance-evidence-release.json \
            --version "${{ needs.preflight.outputs.version }}" \
            --source-commit "$GITHUB_SHA"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: redevplugin-performance-release
          path: dist/performance-evidence-release.json
          if-no-files-found: error

  package-ui:
    name: Build SDK Packages Once
    needs:
      - preflight
      - quality-release
      - audit-release
      - stress-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: npm
      - name: Pin npm used for immutable packing
        run: npm i -g npm@11.18.0
      - run: npm ci
      - run: rustup show
      - run: rustup target add wasm32-unknown-unknown
      - run: npm run build
      - name: Build immutable npm tarball
        run: node scripts/build_redevplugin_ui_package.mjs "${{ needs.preflight.outputs.version }}" dist/npm-package
      - name: Build immutable Rust worker SDK crate
        run: node scripts/build_redevplugin_worker_sdk_package.mjs "${{ needs.preflight.outputs.version }}" dist/worker-sdk-package
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: redevplugin-ui-package
          path: dist/npm-package/*.tgz
          if-no-files-found: error
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: redevplugin-worker-sdk-package
          path: dist/worker-sdk-package/*.crate
          if-no-files-found: error

  runtime:
    name: Runtime ${{ matrix.target }}
    needs:
      - preflight
      - quality-release
      - package-ui
      - performance-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - os: macos-15-intel
            target: x86_64-apple-darwin
          - os: macos-14
            target: aarch64-apple-darwin
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: redevplugin-ui-package
          path: dist/npm-package
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: redevplugin-worker-sdk-package
          path: dist/worker-sdk-package
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: redevplugin-performance-release
          path: dist/performance-release
      - name: Build release bundle from immutable SDK artifacts
        run: |
          set -euo pipefail
          npm_package=$(find dist/npm-package -maxdepth 1 -type f -name '*.tgz' -print -quit)
          worker_sdk_package=$(find dist/worker-sdk-package -maxdepth 1 -type f -name '*.crate' -print -quit)
          performance_evidence=$(find dist/performance-release -maxdepth 1 -type f -name 'performance-evidence-release.json' -print -quit)
          test -n "$npm_package"
          test -n "$worker_sdk_package"
          test -n "$performance_evidence"
          ./scripts/build_redevplugin_release.sh \
            --version "${{ needs.preflight.outputs.version }}" \
            --runtime-target "${{ matrix.target }}" \
            --npm-package "$npm_package" \
            --worker-sdk-package "$worker_sdk_package" \
            --performance-gate release \
            --performance-evidence "$performance_evidence" \
            --source-commit "$GITHUB_SHA" \
            --out-dir "dist/redevplugin-${{ needs.preflight.outputs.label }}-${{ matrix.target }}"
      - name: Archive release bundle
        run: tar -C dist -czf "dist/redevplugin-${{ needs.preflight.outputs.label }}-${{ matrix.target }}.tar.gz" "redevplugin-${{ needs.preflight.outputs.label }}-${{ matrix.target }}"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: redevplugin-${{ needs.preflight.outputs.label }}-${{ matrix.target }}
          path: dist/redevplugin-${{ needs.preflight.outputs.label }}-${{ matrix.target }}.tar.gz
          if-no-files-found: error

  publish-npm:
    name: Publish npm Package
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - preflight
      - quality-release
      - package-ui
      - runtime
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - name: Ensure npm supports trusted publishing
        run: npm i -g npm@11.18.0
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: redevplugin-ui-package
          path: dist/npm-package
      - name: Recheck immutable public tag before npm publication
        env:
          GH_TOKEN: ${{ github.token }}
        run: ./scripts/verify_github_release_identity.sh "$GITHUB_REPOSITORY" "$GITHUB_REF_NAME" "$GITHUB_SHA"
      - name: Publish or verify identical npm bytes
        run: |
          set -euo pipefail
          version="${{ needs.preflight.outputs.version }}"
          package=$(find dist/npm-package -maxdepth 1 -type f -name '*.tgz' -print -quit)
          test -n "$package"
          expected_integrity=$(node --input-type=module - "$package" <<'NODE'
          import { createHash } from "node:crypto";
          import { readFileSync } from "node:fs";
          const bytes = readFileSync(process.argv[2]);
          console.log(`sha512-${createHash("sha512").update(bytes).digest("base64")}`);
          NODE
          )
          if published_integrity=$(npm view "@floegence/redevplugin-ui@${version}" dist.integrity 2>/dev/null); then
            if [[ "$published_integrity" != "$expected_integrity" ]]; then
              echo "published npm integrity does not match the immutable package bytes" >&2
              exit 1
            fi
          else
            npm publish "$package" --access public --provenance
          fi
          for attempt in $(seq 1 20); do
            if node scripts/verify_npm_registry_release.mjs "$version" "$GITHUB_SHA" "$expected_integrity"; then
              exit 0
            fi
            sleep 6
          done
          echo "npm registry did not return the expected tarball and SLSA provenance" >&2
          exit 1

  publish:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - preflight
      - quality-release
      - runtime
      - publish-npm
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - name: Recheck immutable release coordinate
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ./scripts/verify_github_release_identity.sh "$GITHUB_REPOSITORY" "$GITHUB_REF_NAME" "$GITHUB_SHA"
          ./scripts/assert_github_release_absent.sh "$GITHUB_REPOSITORY" "$GITHUB_REF_NAME"
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: redevplugin-${{ needs.preflight.outputs.label }}-*
          path: dist/artifacts
          merge-multiple: true
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: redevplugin-release-stress
          path: dist/artifacts
      - name: Checksums
        run: |
          cd dist/artifacts
          sha256sum \
            *.tar.gz \
            redevplugin-release-stress.json \
            redevplugin-a2-acceptance.json \
            redevplugin-a2-supported.png \
            redevplugin-a2-unsupported.png \
            > SHA256SUMS
      - uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3
        with:
          cosign-release: v2.4.3
      - name: Sign release artifacts
        run: |
          cd dist/artifacts
          for file in \
            *.tar.gz \
            redevplugin-release-stress.json \
            redevplugin-a2-acceptance.json \
            redevplugin-a2-supported.png \
            redevplugin-a2-unsupported.png \
            SHA256SUMS; do
            cosign sign-blob --yes \
              --bundle "${file}.bundle" \
              --output-signature "${file}.sig" \
              "$file"
          done
      - name: Verify signed release artifacts
        run: ./scripts/verify_redevplugin_release_artifacts.sh --tag "$GITHUB_REF_NAME" dist/artifacts
      - name: Create immutable GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release create "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --verify-tag \
            --generate-notes \
            --latest \
            dist/artifacts/*.tar.gz \
            dist/artifacts/*.tar.gz.sig \
            dist/artifacts/*.tar.gz.bundle \
            dist/artifacts/redevplugin-release-stress.json \
            dist/artifacts/redevplugin-release-stress.json.sig \
            dist/artifacts/redevplugin-release-stress.json.bundle \
            dist/artifacts/redevplugin-a2-acceptance.json \
            dist/artifacts/redevplugin-a2-acceptance.json.sig \
            dist/artifacts/redevplugin-a2-acceptance.json.bundle \
            dist/artifacts/redevplugin-a2-supported.png \
            dist/artifacts/redevplugin-a2-supported.png.sig \
            dist/artifacts/redevplugin-a2-supported.png.bundle \
            dist/artifacts/redevplugin-a2-unsupported.png \
            dist/artifacts/redevplugin-a2-unsupported.png.sig \
            dist/artifacts/redevplugin-a2-unsupported.png.bundle \
            dist/artifacts/SHA256SUMS \
            dist/artifacts/SHA256SUMS.sig \
            dist/artifacts/SHA256SUMS.bundle

  verify-published-release:
    name: Verify Published Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - preflight
      - publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - run: rustup target add wasm32-unknown-unknown
      - uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3
        with:
          cosign-release: v2.4.3
      - name: Verify public tag and GitHub Release identity
        env:
          GH_TOKEN: ${{ github.token }}
        run: ./scripts/verify_github_release_identity.sh --require-release "$GITHUB_REPOSITORY" "$GITHUB_REF_NAME" "$GITHUB_SHA"
      - name: Download immutable GitHub Release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p dist/published
          gh release download "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --dir dist/published
      - name: Verify signatures, checksums, compatibility, runtime matrix, and npm identity
        id: published-release
        run: |
          set -euo pipefail
          ./scripts/verify_redevplugin_release_artifacts.sh --tag "$GITHUB_REF_NAME" dist/published
          npm_integrity=$(node scripts/verify_published_release.mjs \
            --npm-integrity \
            dist/published \
            "${{ needs.preflight.outputs.version }}" \
            "$GITHUB_SHA")
          echo "npm_integrity=$npm_integrity" >> "$GITHUB_OUTPUT"
      - name: Verify npm and Go module registry readback
        run: |
          set -euo pipefail
          version="${{ needs.preflight.outputs.version }}"
          expected_integrity="${{ steps.published-release.outputs.npm_integrity }}"
          for attempt in $(seq 1 20); do
            if node scripts/verify_npm_registry_release.mjs "$version" "$GITHUB_SHA" "$expected_integrity"; then
              break
            fi
            if [[ "$attempt" = 20 ]]; then
              echo "npm tarball or SLSA provenance readback mismatch" >&2
              exit 1
            fi
            sleep 6
          done
          for attempt in $(seq 1 20); do
            if node scripts/verify_go_module_readback.mjs "$version" "$GITHUB_SHA"; then
              exit 0
            fi
            sleep 15
          done
          echo "Go module proxy did not expose the expected v${version} identity" >&2
          exit 1
