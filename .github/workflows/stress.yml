name: Stress Gate

on:
  schedule:
    - cron: "17 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  stress-full:
    name: Full Stress Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: rustup show
      - name: High-risk parser fuzzing
        run: ./scripts/check_redevplugin_property_gates.sh --stress
      - name: Full platform performance evidence
        run: |
          ./scripts/check_redevplugin_performance.sh \
            --full \
            --output dist/performance-evidence-full.json \
            --version "0.0.0-weekly.${GITHUB_RUN_NUMBER}" \
            --source-commit "$GITHUB_SHA"
      - run: ./scripts/check_redevplugin_stress.sh --full --summary dist/redevplugin-stress-full.json
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: redevplugin-stress-full
          path: |
            dist/redevplugin-stress-full.json
            dist/performance-evidence-full.json
          if-no-files-found: ignore
